<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,900&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #FDFAF8; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 200px; }
.logo-wrap { display: flex; flex-direction: column; align-items: flex-start; padding: 32px 40px; }
.logo-wordmark { font-family: 'Bodoni Moda', serif; font-weight: 900; font-size: 52px; letter-spacing: 0.16em; text-transform: uppercase; background: linear-gradient(135deg, #F5A97F 0%, #E8508A 40%, #B07FEC 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
.logo-sub { font-family: 'Pinyon Script', cursive; font-size: 30px; color: #7A6880; margin-top: 2px; padding-left: 6px; }
.logo-tagline { font-family: 'Outfit', sans-serif; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #A89AAF; margin-top: 10px; padding-left: 4px; }
.variants { display: flex; gap: 24px; padding: 24px 40px; border-top: 1px solid #EDE8EA; margin-top: 0; width: 100%; }
.v-dark { background: #2D1B2E; border-radius: 12px; padding: 16px 20px; flex: 1; }
.v-grad { background: linear-gradient(135deg, #F5A97F, #E8508A, #B07FEC, #6BBAED); border-radius: 12px; padding: 16px 20px; flex: 1; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div style="width:100%">
  <div class="logo-wrap">
    <div class="logo-wordmark">CACUSA</div>
    <div class="logo-sub">by Taitus</div>
    <div class="logo-tagline">Joyería personalizada · Ecuador & USA</div>
  </div>
  <div class="variants">
    <div class="v-dark">
      <div style="font-family:'Bodoni Moda',serif;font-weight:900;font-size:28px;letter-spacing:0.14em;color:white;text-transform:uppercase">CACUSA</div>
      <div style="font-family:'Pinyon Script',cursive;font-size:20px;color:rgba(255,255,255,0.6)">by Taitus</div>
    </div>
    <div class="v-grad">
      <div style="text-align:center">
        <div style="font-family:'Bodoni Moda',serif;font-weight:900;font-size:28px;letter-spacing:0.14em;color:white;text-transform:uppercase">CACUSA</div>
        <div style="font-family:'Pinyon Script',cursive;font-size:20px;color:rgba(255,255,255,0.85)">by Taitus</div>
      </div>
    </div>
  </div>
</div>
</body></html>
