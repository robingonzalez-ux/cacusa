<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: #F9F5F7; padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.shadow-card { background: white; border-radius: 12px; padding: 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.box { width: 48px; height: 48px; background: white; border-radius: 10px; }
.name { font-size: 10px; font-weight: 600; color: #1A1118; text-align: center; }
.val { font-size: 9px; color: #7A6880; text-align: center; line-height: 1.4; }
</style></head><body>
<div class="grid">
  <div class="shadow-card" style="box-shadow: 0 2px 8px rgba(176,127,236,0.08)">
    <div class="box" style="box-shadow: 0 2px 8px rgba(176,127,236,0.08)"></div>
    <div class="name">shadow-sm</div>
    <div class="val">0 2px 8px violet 8%</div>
  </div>
  <div class="shadow-card" style="box-shadow: 0 4px 24px rgba(176,127,236,0.12)">
    <div class="box" style="box-shadow: 0 4px 24px rgba(176,127,236,0.12)"></div>
    <div class="name">shadow-md</div>
    <div class="val">0 4px 24px violet 12%</div>
  </div>
  <div class="shadow-card" style="box-shadow: 0 8px 40px rgba(176,127,236,0.16)">
    <div class="box" style="box-shadow: 0 8px 40px rgba(176,127,236,0.16)"></div>
    <div class="name">shadow-lg</div>
    <div class="val">0 8px 40px violet 16%</div>
  </div>
  <div class="shadow-card" style="box-shadow: 0 8px 32px rgba(232,80,138,0.18)">
    <div class="box" style="box-shadow: 0 8px 32px rgba(232,80,138,0.18)"></div>
    <div class="name">shadow-hover</div>
    <div class="val">0 8px 32px rose 18%</div>
  </div>
</div>
</body></html>
