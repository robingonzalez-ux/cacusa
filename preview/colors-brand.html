<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: #FDFAF8; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.swatch { border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.swatch-color { height: 80px; }
.swatch-info { padding: 8px 10px; background: white; }
.swatch-name { font-size: 11px; font-weight: 600; color: #1A1118; }
.swatch-hex { font-size: 10px; color: #7A6880; margin-top: 2px; letter-spacing: 0.04em; }
.swatch-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #A89AAF; margin-bottom: 8px; }
.section { margin-bottom: 16px; }
</style></head><body>
<div class="section">
  <div class="swatch-label">Rose Pink</div>
  <div class="grid">
    <div class="swatch"><div class="swatch-color" style="background:#FCE4EE"></div><div class="swatch-info"><div class="swatch-name">Pale</div><div class="swatch-hex">#FCE4EE</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#F2849E"></div><div class="swatch-info"><div class="swatch-name">Light</div><div class="swatch-hex">#F2849E</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#E8508A"></div><div class="swatch-info"><div class="swatch-name">Rose ●</div><div class="swatch-hex">#E8508A</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#C0336E"></div><div class="swatch-info"><div class="swatch-name">Deep</div><div class="swatch-hex">#C0336E</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#8B1F4A"></div><div class="swatch-info"><div class="swatch-name">Dark</div><div class="swatch-hex">#8B1F4A</div></div></div>
  </div>
</div>
<div class="section">
  <div class="swatch-label">Violet</div>
  <div class="grid">
    <div class="swatch"><div class="swatch-color" style="background:#F0E8FC"></div><div class="swatch-info"><div class="swatch-name">Pale</div><div class="swatch-hex">#F0E8FC</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#CBAAF5"></div><div class="swatch-info"><div class="swatch-name">Light</div><div class="swatch-hex">#CBAAF5</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#B07FEC"></div><div class="swatch-info"><div class="swatch-name">Violet ●</div><div class="swatch-hex">#B07FEC</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#8A56D4"></div><div class="swatch-info"><div class="swatch-name">Deep</div><div class="swatch-hex">#8A56D4</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#5E2FAA"></div><div class="swatch-info"><div class="swatch-name">Dark</div><div class="swatch-hex">#5E2FAA</div></div></div>
  </div>
</div>
<div class="section">
  <div class="swatch-label">Sky Blue</div>
  <div class="grid">
    <div class="swatch"><div class="swatch-color" style="background:#E2F3FC"></div><div class="swatch-info"><div class="swatch-name">Pale</div><div class="swatch-hex">#E2F3FC</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#9DD4F5"></div><div class="swatch-info"><div class="swatch-name">Light</div><div class="swatch-hex">#9DD4F5</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#6BBAED"></div><div class="swatch-info"><div class="swatch-name">Sky ●</div><div class="swatch-hex">#6BBAED</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#4298CC"></div><div class="swatch-info"><div class="swatch-name">Deep</div><div class="swatch-hex">#4298CC</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#2070A0"></div><div class="swatch-info"><div class="swatch-name">Dark</div><div class="swatch-hex">#2070A0</div></div></div>
  </div>
</div>
</body></html>
