<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,900;1,6..96,400&family=Pinyon+Script&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #FDFAF8; padding: 28px 32px; }
.label { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: #A89AAF; margin-bottom: 10px; }
.divider { border: none; border-top: 1px solid #EDE8EA; margin: 18px 0; }
.meta { font-family: 'Outfit', sans-serif; font-size: 10px; color: #A89AAF; margin-top: 5px; }

/* CACUSA wordmark */
.wordmark { display: flex; flex-direction: column; align-items: flex-start; }
.hero-bodoni { font-family: 'Bodoni Moda', serif; font-weight: 900; font-size: 72px; letter-spacing: 0.18em; text-transform: uppercase; line-height: 1; color: #1A1118; }
.hero-bodoni-grad { font-family: 'Bodoni Moda', serif; font-weight: 900; font-size: 72px; letter-spacing: 0.18em; text-transform: uppercase; line-height: 1; background: linear-gradient(135deg, #F5A97F, #E8508A, #B07FEC); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.script-pinyon { font-family: 'Pinyon Script', cursive; font-size: 36px; color: #7A6880; margin-top: -4px; padding-left: 6px; }
.script-pinyon-accent { font-family: 'Pinyon Script', cursive; font-size: 52px; color: #E8508A; }
</style></head><body>

<div class="label">Wordmark — Bodoni Moda 900 + Pinyon Script</div>
<div class="wordmark">
  <div class="hero-bodoni">CACUSA</div>
  <div class="script-pinyon">by Taitus</div>
</div>
<div class="meta">Bodoni Moda 900 · 72px · 0.18em · + Pinyon Script 36px</div>

<div class="divider"></div>

<div class="label">Gradient — variante de marca</div>
<div class="wordmark">
  <div class="hero-bodoni-grad">CACUSA</div>
  <div class="script-pinyon">by Taitus</div>
</div>

<div class="divider"></div>

<div class="label">Script Accent — Pinyon Script</div>
<div class="script-pinyon-accent">"creamos para que luzcas más bella"</div>
<div class="meta">Pinyon Script · 52px · caligrafía editorial</div>

</body></html>
