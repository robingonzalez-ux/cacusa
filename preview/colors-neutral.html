<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: #FDFAF8; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 16px; }
.swatch { border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.swatch-color { height: 72px; }
.swatch-info { padding: 7px 8px; background: white; }
.swatch-name { font-size: 10px; font-weight: 600; color: #1A1118; }
.swatch-hex { font-size: 9px; color: #7A6880; margin-top: 1px; }
.swatch-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #A89AAF; margin-bottom: 8px; }
</style></head><body>
<div class="swatch-label">Neutrals & Peach/Gold Accents</div>
<div class="grid">
  <div class="swatch"><div class="swatch-color" style="background:#1A1118"></div><div class="swatch-info"><div class="swatch-name">Ink</div><div class="swatch-hex">#1A1118</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#2D1B2E"></div><div class="swatch-info"><div class="swatch-name">Plum</div><div class="swatch-hex">#2D1B2E</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#4A3050"></div><div class="swatch-info"><div class="swatch-name">Plum Mid</div><div class="swatch-hex">#4A3050</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#7A6880"></div><div class="swatch-info"><div class="swatch-name">Muted</div><div class="swatch-hex">#7A6880</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#A89AAF"></div><div class="swatch-info"><div class="swatch-name">Subtle</div><div class="swatch-hex">#A89AAF</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#EDE8EA; border: 1px solid #e0d8db"></div><div class="swatch-info"><div class="swatch-name">Border</div><div class="swatch-hex">#EDE8EA</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F9F5F7; border: 1px solid #e0d8db"></div><div class="swatch-info"><div class="swatch-name">Surface</div><div class="swatch-hex">#F9F5F7</div></div></div>
</div>
<div class="grid" style="grid-template-columns: repeat(5,1fr)">
  <div class="swatch"><div class="swatch-color" style="background:#FEF0E7"></div><div class="swatch-info"><div class="swatch-name">Peach Pale</div><div class="swatch-hex">#FEF0E7</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F5A97F"></div><div class="swatch-info"><div class="swatch-name">Peach ●</div><div class="swatch-hex">#F5A97F</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F7F0E3"></div><div class="swatch-info"><div class="swatch-name">Gold Pale</div><div class="swatch-hex">#F7F0E3</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#C9A46A"></div><div class="swatch-info"><div class="swatch-name">Gold ●</div><div class="swatch-hex">#C9A46A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#A07840"></div><div class="swatch-info"><div class="swatch-name">Gold Deep</div><div class="swatch-hex">#A07840</div></div></div>
</div>
</body></html>
