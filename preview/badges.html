<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: #FDFAF8; padding: 24px; }
.label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #A89AAF; margin-bottom: 12px; }
.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; }
.badge-rose { background: #FCE4EE; color: #E8508A; }
.badge-violet { background: #F0E8FC; color: #8A56D4; }
.badge-sky { background: #E2F3FC; color: #4298CC; }
.badge-gold { background: #F7F0E3; color: #A07840; }
.badge-peach { background: #FEF0E7; color: #D97F4F; }
.badge-dark { background: #2D1B2E; color: white; }
.badge-solid-rose { background: #E8508A; color: white; }
.tag { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
</style></head><body>
<div class="label">Category Badges</div>
<div class="row">
  <span class="badge badge-rose">Personalizado</span>
  <span class="badge badge-violet">Colección</span>
  <span class="badge badge-sky">Hombres</span>
  <span class="badge badge-gold">Gold Edition</span>
  <span class="badge badge-peach">Artesanal</span>
  <span class="badge badge-dark">Exclusivo</span>
</div>
<div class="label">Product Tags</div>
<div class="row">
  <span class="tag" style="background:#FCE4EE;color:#E8508A">Nuevo</span>
  <span class="tag" style="background:#F7F0E3;color:#A07840">Agotado</span>
  <span class="tag" style="background:#E2F3FC;color:#4298CC">Envío gratis</span>
  <span class="tag" style="background:linear-gradient(135deg,#E8508A,#B07FEC);color:white">−20%</span>
  <span class="tag" style="background:#2D1B2E;color:white">Best seller</span>
</div>
<div class="label">Status Dots</div>
<div class="row">
  <span class="badge badge-rose" style="gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#E8508A;display:inline-block"></span>Disponible</span>
  <span class="badge badge-gold" style="gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#C9A46A;display:inline-block"></span>Últimas unidades</span>
  <span class="badge" style="background:#F9F5F7;color:#A89AAF;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#A89AAF;display:inline-block"></span>Agotado</span>
</div>
</body></html>
