<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: #F9F5F7; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(26,17,24,0.08); transition: all 0.3s; }
.card:hover { box-shadow: 0 8px 32px rgba(232,80,138,0.18); transform: translateY(-4px); }
.card-img { height: 120px; display: flex; align-items: center; justify-content: center; }
.card-body { padding: 14px; }
.card-overline { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #E8508A; margin-bottom: 4px; }
.card-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 400; color: #1A1118; margin-bottom: 4px; }
.card-price { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: #C9A46A; }
.card-price-old { text-decoration: line-through; color: #A89AAF; font-weight: 400; font-size: 12px; margin-left: 6px; }
.tag { display: inline-block; background: #FCE4EE; color: #E8508A; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 999px; padding: 3px 10px; margin-bottom: 8px; }
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="card-img" style="background: linear-gradient(135deg, #FCE4EE, #F0E8FC)">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="16" r="8" stroke="#E8508A" stroke-width="1.5" fill="none"/><path d="M8 32c0-6.627 5.373-12 12-12s12 5.373 12 12" stroke="#E8508A" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </div>
    <div class="card-body">
      <div class="card-overline">Personalizado</div>
      <div class="card-title">Collar con nombre</div>
      <div style="margin-top:6px"><span class="card-price">$45.00</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-img" style="background: linear-gradient(135deg, #F7F0E3, #FEF0E7)">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M20 8l3 9h9l-7 5 3 9-8-6-8 6 3-9-7-5h9z" stroke="#C9A46A" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
    </div>
    <div class="card-body">
      <div class="tag">Nuevo</div>
      <div class="card-title">Anillo estrella gold</div>
      <div style="margin-top:6px"><span class="card-price">$38.00</span><span class="card-price-old">$50.00</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-img" style="background: linear-gradient(135deg, #E2F3FC, #F0E8FC)">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M12 20c0-4.418 3.582-8 8-8s8 3.582 8 8-3.582 8-8 8-8-3.582-8-8z" stroke="#6BBAED" stroke-width="1.5" fill="none"/><path d="M20 14v6l4 2" stroke="#6BBAED" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <div class="card-body">
      <div class="card-overline">Hombres</div>
      <div class="card-title">Pulsera minimalista</div>
      <div style="margin-top:6px"><span class="card-price">$28.00</span></div>
    </div>
  </div>
</div>
</body></html>
