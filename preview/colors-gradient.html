<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: #FDFAF8; padding: 20px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grad { border-radius: 12px; height: 80px; }
.label { font-size: 10px; font-weight: 600; color: #1A1118; margin-top: 6px; }
.sub { font-size: 9px; color: #7A6880; margin-top: 2px; }
.item { }
</style></head><body>
<div class="grid">
  <div class="item">
    <div class="grad" style="background: linear-gradient(135deg, #F5A97F 0%, #E8508A 35%, #B07FEC 70%, #6BBAED 100%)"></div>
    <div class="label">Brand — Full Spectrum</div>
    <div class="sub">Peach → Rose → Violet → Sky</div>
  </div>
  <div class="item">
    <div class="grad" style="background: linear-gradient(135deg, #E8508A 0%, #B07FEC 100%)"></div>
    <div class="label">Rose Violet</div>
    <div class="sub">Primary gradient for buttons & UI</div>
  </div>
  <div class="item">
    <div class="grad" style="background: linear-gradient(135deg, #FCE4EE 0%, #F0E8FC 50%, #E2F3FC 100%)"></div>
    <div class="label">Soft Pastel</div>
    <div class="sub">Backgrounds, section fills</div>
  </div>
  <div class="item">
    <div class="grad" style="background: linear-gradient(135deg, #C9A46A 0%, #DEC28F 100%)"></div>
    <div class="label">Champagne Gold</div>
    <div class="sub">Luxury accents, jewelry details</div>
  </div>
</div>
</body></html>
