  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 suaves */\n  /* gradients */\n  --grad:       linear-gradient(135deg,#F5C8A8,#EE6FA8,#C4A0EC,#88C8F0);\n  --grad-warm:  linear-gradient(135deg,#F5C8A8,#EE6FA8,#F5A0C8);\n  --grad-cool:  linear-gradient(135deg,#C4A0EC,#88C8F0,#DCF0FC);\n  --grad-full:  linear-gradient(135deg,#F5C8A8 0%,#EE6FA8 30%,#C4A0EC 65%,#88C8F0 100%);\n  /* fonts */\n  --fd:'Bodoni Moda',serif;\n  --fs:'Pinyon Script',cursive;\n  --fe:'Cormorant Garamond',serif;\n  --fu:'Outfit',sans-serif;\n}\nhtml{scroll-behavior:smooth}\nbody{font-family:var(--fu);background:var(--pearl);color:var(--ink);overflow-x:hidden;cursor:none}\n\n/* ── CUSTOM CURSOR ─────────────────────────────────── */\n#cursor{position:fixed;width:10px;height:10px;background:var(--pink);border-radius:50%;pointer-events:none;z-index:9999;transition:transform .15s;mix-blend-mode:multiply}\n#cursor-ring{position:fixed;width:32px;height:32px;border:1.5px solid var(--pink);border-radius:50%;pointer-events:none;z-index:9998;opacity:.5;transition:transform .4s cubic-bezier(.25,.46,.45,.94)}\n.cursor-grow #cursor{transform:scale(2.8);opacity:.5}\n.cursor-grow #cursor-ring{transform:scale(1.5)}\n\n/* ── LOADER ────────────────────────────────────────── */\n#loader{position:fixed;inset:0;background:var(--grad-full);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:opacity .8s,visibility .8s}\n#loader.hidden{opacity:0;visibility:hidden}\n.loader-w{font-family:var(--fd);font-weight:900;font-size:72px;letter-spacing:.2em;text-transform:uppercase;color:white;animation:ldW 1.2s cubic-bezier(.4,0,.2,1) forwards;opacity:0;text-shadow:0 2px 24px rgba(255,255,255,.4)}\n.loader-s{font-family:var(--fs);font-size:32px;color:rgba(255,255,255,.7);animation:ldS 1s .4s both}\n.loader-bar{width:100px;height:1.5px;background:rgba(255,255,255,.25);margin-top:28px;border-radius:1px;overflow:hidden}\n.loader-prog{height:100%;background:white;animation:ldB 1.5s .3s cubic-bezier(.4,0,.2,1) forwards;width:0}\n@keyframes ldW{from{opacity:0;letter-spacing:.5em}to{opacity:1;letter-spacing:.2em}}\n@keyframes ldS{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n@keyframes ldB{to{width:100%}}\n\n/* ── TICKER ────────────────────────────────────────── */\n#ticker{height:38px;overflow:hidden;display:flex;align-items:center;background:var(--pink);position:relative;z-index:600}\n.t-track{display:flex;animation:tScroll 28s linear infinite;white-space:nowrap}\n.t-item{font-family:var(--fu);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:white;padding:0 36px;display:flex;align-items:center;gap:10px}\n.t-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.5);flex-shrink:0}\n@keyframes tScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n\n/* ── NAV ───────────────────────────────────────────── */\nnav{position:fixed;top:38px;left:0;right:0;z-index:500;padding:0 52px;height:68px;display:flex;align-items:center;justify-content:space-between;transition:all .4s}\nnav.scrolled{top:0;background:rgba(254,248,255,.95);backdrop-filter:blur(16px);border-bottom:1.5px solid var(--ink-light);box-shadow:0 2px 20px rgba(238,111,168,.08)}\n.nav-logo{display:flex;flex-direction:column;line-height:1;cursor:pointer}\n.nav-logo .w{font-family:var(--fd);font-weight:900;font-size:22px;letter-spacing:.16em;text-transform:uppercase;color:white;transition:all .4s}\nnav.scrolled .nav-logo .w{background:var(--grad-full);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.nav-logo .s{font-family:var(--fs);font-size:15px;color:rgba(255,255,255,.65);transition:color .4s}\nnav.scrolled .nav-logo .s{color:var(--ink-muted)}\n.nav-links{display:flex;gap:34px}\n.nav-links a{font-family:var(--fu);font-size:13px;font-weight:500;color:rgba(255,255,255,.8);letter-spacing:.04em;transition:color .2s;text-decoration:none;cursor:none}\nnav.scrolled .nav-links a{color:var(--ink-muted)}\n.nav-links a:hover{color:white}\nnav.scrolled .nav-links a:hover{color:var(--pink)}\n.nav-cta{background:white;color:var(--pink);font-family:var(--fu);font-weight:600;font-size:12px;letter-spacing:.06em;border:none;border-radius:999px;padding:10px 22px;cursor:none;transition:all .25s;box-shadow:0 2px 16px rgba(255,255,255,.3)}\nnav.scrolled .nav-cta{background:var(--pink);color:white;box-shadow:0 2px 16px rgba(238,111,168,.35)}\n.nav-cta:hover{transform:scale(1.04)}\n\n/* ── HERO ──────────────────────────────────────────── */\n#hero{position:relative;height:100vh;min-height:700px;overflow:hidden;display:flex;align-items:center}\n#hero-canvas{position:absolute;inset:0;width:100%;height:100%}\n.hero-content{position:relative;z-index:2;padding:0 80px;max-width:660px}\n.hero-label{font-family:var(--fu);font-size:11px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:18px;opacity:0;animation:fUp .8s .8s both}\n.hero-h1{font-family:var(--fd);font-weight:900;font-size:clamp(52px,7vw,86px);line-height:1;color:white;margin-bottom:10px;opacity:0;animation:fUp .9s 1s both;text-shadow:0 2px 32px rgba(238,111,168,.3)}\n.hero-h1 em{font-style:italic;font-weight:400}\n.hero-script{font-family:var(--fs);font-size:clamp(28px,3.5vw,44px);color:rgba(255,255,255,.8);margin-bottom:24px;opacity:0;animation:fUp .8s 1.2s both}\n.hero-desc{font-family:var(--fe);font-size:18px;font-style:italic;color:rgba(255,255,255,.75);line-height:1.7;max-width:420px;margin-bottom:34px;opacity:0;animation:fUp .8s 1.35s both}\n.hero-btns{display:flex;gap:14px;opacity:0;animation:fUp .8s 1.5s both}\n.btn-h1{background:white;color:var(--pink);font-family:var(--fu);font-weight:600;font-size:13px;letter-spacing:.05em;border:none;border-radius:999px;padding:14px 32px;cursor:none;transition:all .3s;box-shadow:0 4px 24px rgba(255,255,255,.35)}\n.btn-h1:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,255,255,.45)}\n.btn-h2{background:rgba(255,255,255,.15);color:white;border:1.5px solid rgba(255,255,255,.5);font-family:var(--fu);font-weight:500;font-size:13px;letter-spacing:.05em;border-radius:999px;padding:12px 28px;cursor:none;backdrop-filter:blur(8px);transition:all .3s}\n.btn-h2:hover{background:rgba(255,255,255,.25);border-color:white}\n.hero-scroll{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fUp .8s 2s both}\n.hero-scroll span{font-family:var(--fu);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5)}\n.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,rgba(255,255,255,.5),transparent);animation:sLine 2s ease infinite}\n@keyframes sLine{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}\n\n/* Hero floating cards */\n.hero-cards{position:absolute;right:72px;top:50%;transform:translateY(-50%);display:grid;grid-template-columns:1fr 1fr;gap:14px;z-index:2;opacity:0;animation:fLeft .9s 1.6s both}\n.hcard{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-radius:18px;padding:12px;box-shadow:0 8px 32px rgba(238,111,168,.2);transition:transform .3s}\n.hcard:hover{transform:translateY(-6px) !important}\n.hcard:nth-child(even){transform:translateY(24px)}\n.hc-img{height:90px;border-radius:12px;margin-bottom:10px}\n.hc-cat{font-family:var(--fu);font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--pink);margin-bottom:3px}\n.hc-name{font-family:var(--fe);font-size:14px;color:var(--ink)}\n.hc-price{font-family:var(--fu);font-size:13px;font-weight:600;color:var(--ink-mid);margin-top:4px}\n\n@keyframes fUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}\n@keyframes fLeft{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}\n\n/* ── SECTIONS ──────────────────────────────────────── */\nsection{padding:96px 0}\n.container{max-width:1200px;margin:0 auto;padding:0 52px}\n.section-label{font-family:var(--fu);font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--pink);margin-bottom:14px}\n.section-h{font-family:var(--fd);font-weight:900;font-size:clamp(36px,4vw,52px);color:var(--ink);line-height:1.05}\n.section-h em{font-style:italic;font-weight:400;color:var(--pink)}\n.section-sub{font-family:var(--fe);font-size:18px;font-style:italic;color:var(--ink-muted);line-height:1.7;margin-top:12px}\n\n/* ── REVEAL ────────────────────────────────────────── */\n.reveal{opacity:0;transform:translateY(36px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1)}\n.reveal-left{opacity:0;transform:translateX(-36px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1)}\n.reveal-right{opacity:0;transform:translateX(36px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1)}\n.reveal-scale{opacity:0;transform:scale(.93);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1)}\n.reveal.visible,.reveal-left.visible,.reveal-right.visible,.reveal-scale.visible{opacity:1;transform:none}\n[data-delay=\"1\"]{transition-delay:.1s}[data-delay=\"2\"]{transition-delay:.2s}[data-delay=\"3\"]{transition-delay:.3s}[data-delay=\"4\"]{transition-delay:.4s}[data-delay=\"5\"]{transition-delay:.5s}\n\n/* ── COLLECTIONS ───────────────────────────────────── */\n#collections{background:var(--pearl)}\n.col-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:270px 270px;gap:16px;margin-top:48px}\n.col-card{border-radius:22px;overflow:hidden;position:relative;cursor:none}\n.col-card:first-child{grid-row:1/3}\n.col-bg{position:absolute;inset:0;transition:transform .6s cubic-bezier(.4,0,.2,1)}\n.col-card:hover .col-bg{transform:scale(1.06)}\n.col-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(139,42,90,.4) 0%,transparent 55%);transition:opacity .4s}\n.col-card:hover .col-overlay{opacity:1.3}\n.col-content{position:absolute;bottom:0;left:0;right:0;padding:24px;transform:translateY(6px);transition:transform .4s}\n.col-card:hover .col-content{transform:none}\n.col-tag{font-family:var(--fu);font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:5px}\n.col-title{font-family:var(--fd);font-weight:700;font-size:22px;color:white;line-height:1.2}\n.col-cta{font-family:var(--fu);font-size:11px;font-weight:600;letter-spacing:.1em;color:white;margin-top:8px;opacity:0;transition:opacity .4s .1s}\n.col-card:hover .col-cta{opacity:1}\n\n/* gradient fills for collection cards */\n.gA{background:linear-gradient(150deg,#F5C8A8,#EE6FA8,#C4A0EC)}\n.gB{background:linear-gradient(135deg,#F5C8A8,#EE6FA8)}\n.gC{background:linear-gradient(135deg,#C4A0EC,#88C8F0)}\n.gD{background:linear-gradient(135deg,#88C8F0,#DCF0FC)}\n.gE{background:linear-gradient(135deg,#F5A0C8,#C4A0EC)}\n\n/* ── PRODUCTS ──────────────────────────────────────── */\n#products{background:var(--pink-pale,#FCE8F3)}\n.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:48px}\n.prod-card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(238,111,168,.1);transition:box-shadow .4s,transform .4s;cursor:none;position:relative}\n.prod-card:hover{box-shadow:0 12px 40px rgba(238,111,168,.22);transform:translateY(-6px)}\n.prod-img{height:200px;position:relative;overflow:hidden}\n.prod-quick{position:absolute;bottom:0;left:0;right:0;background:rgba(139,42,90,.75);backdrop-filter:blur(4px);color:white;font-family:var(--fu);font-size:12px;font-weight:500;letter-spacing:.06em;text-align:center;padding:12px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}\n.prod-card:hover .prod-quick{transform:none}\n.prod-body{padding:16px}\n.prod-cat{font-family:var(--fu);font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--pink);margin-bottom:4px}\n.prod-name{font-family:var(--fe);font-size:16px;color:var(--ink)}\n.prod-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}\n.prod-price{font-family:var(--fu);font-size:14px;font-weight:600;color:var(--ink-mid)}\n.prod-add{background:var(--pink-pale,#FCE8F3);color:var(--pink);font-family:var(--fu);font-size:11px;font-weight:600;border:none;border-radius:999px;padding:7px 14px;cursor:none;transition:all .2s}\n.prod-add:hover{background:var(--pink);color:white}\n.prod-badge{position:absolute;top:12px;left:12px;background:var(--pink);color:white;font-family:var(--fu);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:999px;padding:4px 10px;z-index:2}\n\n/* ── BRAND STORY ───────────────────────────────────── */\n#story{background:var(--grad-full);position:relative;overflow:hidden}\n#story::before{content:'';position:absolute;top:-100px;right:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.15) 0%,transparent 70%)}\n#story::after{content:'';position:absolute;bottom:-80px;left:-60px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 70%)}\n.story-grid{display:grid;grid-template-columns:1fr 1fr;gap:96px;align-items:center;position:relative;z-index:1}\n.story-label{font-family:var(--fu);font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:14px}\n.story-h{font-family:var(--fd);font-weight:900;font-size:clamp(40px,4vw,54px);color:white;line-height:1.05;margin-bottom:18px;text-shadow:0 2px 24px rgba(0,0,0,.1)}\n.story-h em{font-style:italic;font-weight:400;color:rgba(255,255,255,.75)}\n.story-quote{font-family:var(--fs);font-size:28px;color:rgba(255,255,255,.65);line-height:1.5;margin-botto t><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><circle cx=\"17.5\" cy=\"6.5\" r=\"1.5\" fill=\"white\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n          Seguir @cacusabytaitus\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Feed placeholder — reemplaza con embed de Behold.so o Elfsight cuando tengas API -->\n    <!-- Instrucción: ve a https://behold.so, conecta @cacusabytaitus y pega tu <div data-behold-id=\"...\"> aquí -->\n    <div class=\"ig-grid\" id=\"igGrid\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CTA TIENDA — banner al pie de la sección Instagram -->\n  <div style=\"background:var(--grad-warm);margin-top:64px;padding:60px 0;text-align:center;position:relative;overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(circle at 25% 50%,rgba(255,255,255,.18),transparent 55%)\"><\u002Fdiv>\n    <div style=\"position:relative;z-index:1\">\n      <div style=\"font-family:var(--fs);font-size:34px;color:rgba(255,255,255,.7);margin-bottom:8px\">¿Lista para tu pieza?<\u002Fdiv>\n      <div style=\"font-family:var(--fd);font-weight:900;font-size:clamp(30px,4vw,48px);color:white;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,.1);letter-spacing:.02em\">Tu joya te está esperando<\u002Fdiv>\n      <p style=\"font-family:var(--fe);font-size:18px;font-style:italic;color:rgba(255,255,255,.8);max-width:440px;margin:0 auto 32px;line-height:1.7\">\"creamos para que luzcas más bella<br>de lo que ya eres\"<\u002Fp>\n      <a href=\"Tienda CACUSA.html\" style=\"display:inline-flex;align-items:center;gap:10px;background:white;color:var(--pink);font-family:var(--fu);font-weight:700;font-size:14px;letter-spacing:.05em;border-radius:999px;padding:16px 40px;text-decoration:none;box-shadow:0 4px 24px rgba(255,255,255,.35);transition:all .3s\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z\"><\u002Fpath><line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\"><\u002Fline><path d=\"M16 10a4 4 0 01-8 0\"><\u002Fpath><\u002Fsvg>\n        Ir a la tienda →\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"container\">\n    <div class=\"footer-grid\">\n      <div><div class=\"fb-w\">CACUSA<\u002Fdiv><div class=\"fb-s\">by Taitus<\u002Fdiv><div class=\"fb-tag\">\"creamos para que luzcas más bella de lo que ya eres\"<\u002Fdiv><\u002Fdiv>\n      <div>\n        <div class=\"ft\">Tienda<\u002Fdiv>\n        <a class=\"fl\" href=\"Tienda CACUSA.html\">Mujeres<\u002Fa><a class=\"fl\" href=\"Tienda CACUSA.html\">Hombres<\u002Fa><a class=\"fl\" href=\"Tienda CACUSA.html\">Personalizado<\u002Fa><a class=\"fl\" href=\"Tienda CACUSA.html\">Gold Edition<\u002Fa><a class=\"fl\" href=\"Tienda CACUSA.html\">Novedades<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <div class=\"ft\">Ayuda<\u002Fdiv>\n        <a class=\"fl\">Envíos<\u002Fa><a class=\"fl\">Devoluciones<\u002Fa><a class=\"fl\">Tamaños<\u002Fa><a class=\"fl\">Cuidados<\u002Fa><a class=\"fl\">Contacto<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <div class=\"ft\">Nosotros<\u002Fdiv>\n        <a class=\"fl\" href=\"https://www.instagram.com/cacusabytaitus/\" target=\"_blank\" rel=\"noopener\">Instagram @cacusabytaitus<\u002Fa><a class=\"fl\">Nuestra historia<\u002Fa><a class=\"fl\">Proceso artesanal<\u002Fa><a class=\"fl\">Ecuador<\u002Fa><a class=\"fl\">USA<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-bottom\">\n      <div class=\"footer-copy\">© 2025 CACUSA by Taitus · Ecuador &amp; USA · Hecho con amor 🤍<\u002Fdiv>\n      <div style=\"font-family:var(--fs);font-size:20px;color:rgba(255,255,255,.5)\">by Taitus<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- VIGNETTE / PROMO -->\n<div id=\"vignette\">\n  <div class=\"vig-box\">\n    <div class=\"vig-visual\">\n      <button class=\"vig-close\" id=\"vigClose\">✕<\u002Fbutton>\n      <div class=\"vig-pct\">20%<\u002Fdiv>\n      <div class=\"vig-off\">DE DESCUENTO<\u002Fdiv>\n      <div class=\"vig-script\">en tu primera pieza<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"vig-body\">\n      <div class=\"vig-label\">Oferta exclusiva<\u002Fdiv>\n      <div class=\"vig-title\">Tu primera joya te espera<\u002Fdiv>\n      <div class=\"vig-desc\">Suscríbete y recibe 20% de descuento en tu primera compra. Solo por tiempo limitado.<\u002Fdiv>\n      <input class=\"vig-email\" placeholder=\"tu@email.com\">\n      <button class=\"vig-btn\" id=\"vigBtn\">Quiero mi descuento →<\u002Fbutton>\n      <div class=\"vig-skip\" id=\"vigSkip\">No gracias, prefiero pagar precio completo<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ── CURSOR ──────────────────────────────────────────────────\nconst cur = document.getElementById('cursor');\nconst ring = document.getElementById('cursor-ring');\nlet mx=0,my=0,rx=0,ry=0;\ndocument.addEventListener('mousemove', e => {\n  mx=e.clientX; my=e.clientY;\n  cur.style.left=(mx-5)+'px'; cur.style.top=(my-5)+'px';\n});\n(function anim(){\n  rx+=(mx-rx-16)*.14; ry+=(my-ry-16)*.14;\n  ring.style.left=rx+'px'; ring.style.top=ry+'px';\n  requestAnimationFrame(anim);\n})();\ndocument.querySelectorAll('button,a,.col-card,.prod-card,.ig-item,.hcard').forEach(el=>{\n  el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-grow'));\n  el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-grow'));\n});\n\n// ── LOADER ──────────────────────────────────────────────────\nwindow.addEventListener('load',()=>setTimeout(()=>document.getElementById('loader').classList.add('hidden'),1800));\n\n// ── TICKER ──────────────────────────────────────────────────\nconst tickerMsgs = [\n  'Envío gratis a Ecuador en pedidos +$60','Personaliza tu pieza','Hecho a mano con amor','Ecuador & USA',\n  'Plata 925 y baño de oro 18k','Descuento 20% primera compra','Joyería artesanal única','Nueva colección disponible',\n  'Envío gratis a Ecuador en pedidos +$60','Personaliza tu pieza','Hecho a mano con amor','Ecuador & USA',\n  'Plata 925 y baño de oro 18k','Descuento 20% primera compra','Joyería artesanal única','Nueva colección disponible',\n];\nconst tt = document.getElementById('tTrack');\ntickerMsgs.forEach(m=>{tt.innerHTML+=`<div class=\"t-item\"><div class=\"t-dot\"><\u002Fdiv>${m}<\u002Fdiv>`;});\n\n// ── NAV SCROLL ──────────────────────────────────────────────\nwindow.addEventListener('scroll',()=>{\n  document.getElementById('nav').classList.toggle('scrolled',window.scrollY>70);\n});\n\n// ── HERO CANVAS — bright watercolor, CACUSA palette ─────────\nconst canvas = document.getElementById('hero-canvas');\nconst ctx = canvas.getContext('2d');\nlet W,H,blobs=[];\n// CACUSA true colors: pink, lilac, sky, peach — ALL LIGHT\nconst palette=[\n  [238,111,168],[245,160,200],[196,160,236],[136,200,240],\n  [245,200,168],[245,160,200],[136,200,240],[238,111,168],\n  [196,160,236],[220,240,252]\n];\nfunction initCanvas(){\n  W=canvas.width=canvas.offsetWidth;\n  H=canvas.height=canvas.offsetHeight;\n  blobs=Array.from({length:10},(_,i)=>({\n    x:Math.random()*W, y:Math.random()*H,\n    vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,\n    r:160+Math.random()*220,\n    c:palette[i%palette.length],\n    a:.28+Math.random()*.22,\n    phase:Math.random()*Math.PI*2,\n    speed:.0025+Math.random()*.003\n  }));\n}\nfunction drawCanvas(){\n  ctx.clearRect(0,0,W,H);\n  // base: soft pink-white\n  const bg=ctx.createLinearGradient(0,0,W,H);\n  bg.addColorStop(0,'#F9D0E8');\n  bg.addColorStop(.35,'#E8C0F0');\n  bg.addColorStop(.7,'#C0DEFF');\n  bg.addColorStop(1,'#F5E0C8');\n  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);\n  blobs.forEach(b=>{\n    b.x+=b.vx; b.y+=b.vy; b.phase+=b.speed;\n    if(b.x<-b.r)b.x=W+b.r; if(b.x>W+b.r)b.x=-b.r;\n    if(b.y<-b.r)b.y=H+b.r; if(b.y>H+b.r)b.y=-b.r;\n    const pulse=1+.1*Math.sin(b.phase);\n    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*pulse);\n    g.addColorStop(0,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${b.a})`);\n    g.addColorStop(1,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0)`);\n    ctx.fillStyle=g;\n    ctx.beginPath(); ctx.arc(b.x,b.y,b.r*pulse,0,Math.PI*2); ctx.fill();\n  });\n  requestAnimationFrame(drawCanvas);\n}\ninitCanvas();\nwindow.addEventListener('resize',initCanvas);\nrequestAnimationFrame(drawCanvas);\n\n// ── SCROLL REVEAL ───────────────────────────────────────────\nconst revEls=document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-scale');\nconst obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.1});\nrevEls.forEach(el=>obs.observe(el));\n\n// ── COUNT-UP ────────────────────────────────────────────────\nconst cntEls=document.querySelectorAll('[data-count]');\nconst cntObs=new IntersectionObserver(es=>{\n  es.forEach(e=>{\n    if(!e.isIntersecting)return;\n    const el=e.target, target=+el.dataset.count; let start=0;\n    const step=ts=>{\n      if(!start)start=ts;\n      const p=Math.min((ts-start)/1800,1);\n      el.textContent=Math.floor(p*target)+(el.dataset.suffix||'');\n      if(p<1)requestAnimationFrame(step);\n      else el.textContent=target+(el.dataset.suffix||'');\n    };\n    requestAnimationFrame(step); cntObs.unobserve(el);\n  });\n},{threshold:.5});\ncntEls.forEach(el=>cntObs.observe(el));\n\n// ── TESTIMONIALS ────────────────────────────────────────────\nconst testis=[\n  {t:'\"Mi collar llegó perfectamente, exactamente como lo soñé. CACUSA lo hizo realidad.\"',n:'Valentina M.',l:'Quito, Ecuador'},\n  {t:'\"El anillo de mi esposa es una obra de arte. Quedó enamorada desde el primer momento.\"',n:'Carlos R.',l:'Miami, USA'},\n  {t:'\"La calidad es increíble. Llevo mi pulsera todos los días y recibe muchos cumplidos.\"',n:'Sofía L.',l:'Guayaquil, Ecuador'},\n  {t:'\"Pedí un collar para mi mamá. Lloró de emoción al verlo. Gracias CACUSA.\"',n:'Isabella T.',l:'Nueva York, USA'},\n  {t:'\"Diseño único, atención increíble. Sin duda volvería a comprar. ¡Los mejores!\"',n:'Camila V.',l:'Cuenca, Ecuador'},\n  {t:'\"Recibí mi anillo en tiempo récord. Hermoso, delicado y exactamente lo que pedí.\"',n:'Andrea P.',l:'Los Ángeles, USA'},\n  {t:'\"Mi collar llegó perfectamente, exactamente como lo soñé. CACUSA lo hizo realidad.\"',n:'Valentina M.',l:'Quito, Ecuador'},\n  {t:'\"La calidad es increíble. Llevo mi pulsera todos los días y recibe muchos cumplidos.\"',n:'Sofía L.',l:'Guayaquil, Ecuador'},\n];\nconst tt2=document.getElementById('tTrack2');\ntestis.forEach(t=>{\n  tt2.innerHTML+=`<div class=\"tcard\"><div class=\"tcard-stars\">${Array(5).fill('<div class=\"tcard-star\"><\u002Fdiv>').join('')}<\u002Fdiv><div class=\"tcard-text\">${t.t}<\u002Fdiv><div class=\"tcard-name\">${t.n}<\u002Fdiv><div class=\"tcard-loc\">${t.l}<\u002Fdiv><\u002Fdiv>`;\n});\n\n// ── INSTAGRAM GRID (placeholder hasta conectar feed real) ───\nconst igGs=[\n  'linear-gradient(135deg,#FCE8F3,#EE6FA8)',\n  'linear-gradient(135deg,#F5C8A8,#F5A0C8)',\n  'linear-gradient(135deg,#DCF0FC,#88C8F0)',\n  'linear-gradient(135deg,#EEE4FA,#C4A0EC)',\n  'linear-gradient(135deg,#FCE8F3,#F5A0C8)',\n  'linear-gradient(135deg,#DCF0FC,#C4A0EC)',\n  'linear-gradient(135deg,#F5C8A8,#EE6FA8)',\n  'linear-gradient(135deg,#EEE4FA,#88C8F0)',\n  'linear-gradient(135deg,#FCE8F3,#C4A0EC)',\n  'linear-gradient(135deg,#F5C8A8,#88C8F0)',\n  'linear-gradient(135deg,#FCE8F3,#EE6FA8)',\n  'linear-gradient(135deg,#DCF0FC,#F5A0C8)',\n];\nconst igG=document.getElementById('igGrid');\nif(igG){\n  // Labels de contenido real que CACUSA publica en Instagram\n  const igLabels=['Collar personalizado','Anillo gold','Pulsera inicial','Aretes luna','Nueva colección','Behind the scenes','Collar corazón','Para ellos','Hecho a mano','Personaliza','Envío express','¡Nuevo!'];\n  for(let i=0;i<12;i++){\n    const item=document.createElement('div');\n    item.className='ig-item reveal-scale';\n    item.dataset.delay=String((i%4)+1);\n    item.innerHTML=`\n      <a href=\"https://www.instagram.com/cacusabytaitus/\" target=\"_blank\" rel=\"noopener\" style=\"display:block;width:100%;height:100%;cursor:none\">\n        <div class=\"ig-bg\" style=\"background:${igGs[i]};width:100%;height:100%;display:flex;align-items:flex-end;padding:8px\">\n          <span style=\"font-family:var(--fs);font-size:11px;color:rgba(255,255,255,.75);text-shadow:0 1px 4px rgba(0,0,0,.15)\">${igLabels[i]}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ig-hover\"><div class=\"ig-icon\">♡<\u002Fdiv><\u002Fdiv>\n      <\u002Fa>`;\n    igG.appendChild(item);\n    obs.observe(item);\n  }\n}\n\n// ── VIGNETTE ────────────────────────────────────────────────\nconst vig=document.getElementById('vignette');\nif(!localStorage.getItem('cacusa-vig2')) setTimeout(()=>vig.classList.add('show'),3500);\n[document.getElementById('vigClose'),document.getElementById('vigSkip')].forEach(el=>el.addEventListener('click',()=>{\n  vig.classList.remove('show'); localStorage.setItem('cacusa-vig2','1');\n}));\ndocument.getElementById('vigBtn').addEventListener('click',()=>{\n  vig.classList.remove('show'); localStorage.setItem('cacusa-vig2','1');\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
