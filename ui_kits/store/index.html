<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="CACUSA by Taitus — Joyería Personalizada">
<meta property="og:description" content="Joyería artesanal única, diseñada con amor en Ecuador. Cada pieza lleva tu historia.">
<title>CACUSA by Taitus — Joyería Personalizada</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,900;1,6..96,400&family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --rose: #E8508A; --rose-deep: #C0336E; --rose-pale: #FCE4EE;
  --violet: #B07FEC; --violet-deep: #8A56D4; --violet-pale: #F0E8FC;
  --sky: #6BBAED; --sky-pale: #E2F3FC;
  --peach: #F5A97F; --peach-pale: #FEF0E7;
  --gold: #C9A46A; --gold-pale: #F7F0E3;
  --ink: #1A1118; --plum: #2D1B2E; --plum-mid: #4A3050;
  --muted: #7A6880; --subtle: #A89AAF;
  --border: #EDE8EA; --surface: #F9F5F7; --white: #FDFAF8;
  --grad-brand: linear-gradient(135deg, #F5A97F 0%, #E8508A 35%, #B07FEC 70%, #6BBAED 100%);
  --grad-rose: linear-gradient(135deg, #E8508A, #B07FEC);
  --grad-soft: linear-gradient(135deg, #FCE4EE, #F0E8FC, #E2F3FC);
  --shadow-card: 0 4px 24px rgba(26,17,24,0.08);
  --shadow-hover: 0 8px 32px rgba(232,80,138,0.18);
  --shadow-btn: 0 2px 12px rgba(232,80,138,0.30);
  --font-display: 'Bodoni Moda', serif;
  --font-script: 'Pinyon Script', cursive;
  --font-serif: 'Cormorant Garamond', serif;
  --font-sans: 'Outfit', sans-serif;
}
html, body { height: 100%; font-family: var(--font-sans); background: var(--white); color: var(--ink); }
#root { height: 100%; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
a { text-decoration: none; color: inherit; }
input, textarea, select { font-family: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect } = React;

// ─── RESPONSIVE HOOK ─────────────────────────────────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const handler = () => setW(window.innerWidth);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return w;
}

// ─── DATA ────────────────────────────────────────────────────────────────────
const FALLBACK_PRODUCTS = [
  { id:1, name:'Collar con nombre', category:'Personalizado', price:45, img:'collar', color:'rose', tag:'Bestseller', description:'Collar delicado con tu nombre grabado a mano. Disponible en plata 925 y baño de oro 18k. Personaliza la tipografía y el largo de la cadena.', personalized:true },
  { id:2, name:'Anillo estrella', category:'Colección Gold', price:38, oldPrice:50, img:'ring', color:'gold', tag:'Nuevo', description:'Anillo minimalista con estrella en relieve. Chapado en oro 18k. Símbolo de tu propia luz interior.', personalized:false },
  { id:3, name:'Pulsera inicial', category:'Personalizado', price:32, img:'bracelet', color:'violet', tag:null, description:'Pulsera fina con tu inicial en plata 925. Diseño delicado, perfecto para usar solo o en stack.', personalized:true },
  { id:4, name:'Aretes luna', category:'Colección', price:28, img:'earrings', color:'sky', tag:null, description:'Aretes en forma de luna menguante. Plata 925 con baño de rodio. Ligeros y elegantes.', personalized:false },
  { id:5, name:'Pulsera hombre', category:'Hombres', price:29, img:'bracelet-m', color:'plum', tag:'Nuevo', description:'Pulsera de cuero genuino con cierre magnético en acero inoxidable. Diseño urbano y minimalista.', personalized:false },
  { id:6, name:'Collar corazón', category:'Personalizado', price:42, img:'heart', color:'rose', tag:null, description:'Collar con colgante de corazón grabado con mensaje o fecha especial. El regalo perfecto.', personalized:true },
];

const COLLECTIONS = [
  { id:'all', label:'Todo' },
  { id:'Personalizado', label:'Personalizado' },
  { id:'Colección', label:'Colecciones' },
  { id:'Hombres', label:'Hombres' },
  { id:'Colección Gold', label:'Gold' },
];

// ─── DYNAMIC PRODUCTS ───────────────────────────────────────────────────────
// Products loaded from data/products.json at runtime; FALLBACK_PRODUCTS used if fetch fails
let PRODUCTS = FALLBACK_PRODUCTS;
const PRODUCTS_JSON_URL = "../../data/products.json";
let WHATSAPP_NUMBER = ""; // set via data/products.json

// ─── PRODUCT ILLUSTRATION ────────────────────────────────────────────────────
const ProductIllustration = ({ type, color }) => {
  const colors = { rose:'#E8508A', gold:'#C9A46A', violet:'#B07FEC', sky:'#6BBAED', plum:'#4A3050' };
  const c = colors[color] || '#E8508A';
  const bgs = { rose:'linear-gradient(135deg,#FCE4EE,#F0E8FC)', gold:'linear-gradient(135deg,#F7F0E3,#FEF0E7)', violet:'linear-gradient(135deg,#F0E8FC,#E2F3FC)', sky:'linear-gradient(135deg,#E2F3FC,#F0E8FC)', plum:'linear-gradient(135deg,#EDE8EA,#F9F5F7)' };
  const bg = bgs[color] || bgs.rose;
  const icons = {
    collar: <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M24 8C14 8 8 16 8 24" stroke={c} strokeWidth="2" strokeLinecap="round"/><path d="M24 8C34 8 40 16 40 24" stroke={c} strokeWidth="2" strokeLinecap="round"/><circle cx="24" cy="34" r="6" stroke={c} strokeWidth="2"/><path d="M22 34h4M24 32v4" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,
    ring: <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="10" stroke={c} strokeWidth="2"/><circle cx="24" cy="24" r="6" stroke={c} strokeWidth="1" strokeDasharray="2 2"/><path d="M24 10l1.5 4h4l-3 2.5 1.5 4-4-3-4 3 1.5-4-3-2.5h4z" fill={c} opacity="0.8"/></svg>,
    bracelet: <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><ellipse cx="24" cy="28" rx="14" ry="7" stroke={c} strokeWidth="2"/><ellipse cx="24" cy="20" rx="14" ry="7" stroke={c} strokeWidth="2"/><circle cx="38" cy="24" r="2.5" fill={c}/></svg>,
    earrings: <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="17" cy="14" r="3" stroke={c} strokeWidth="1.5"/><path d="M17 17v4" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M14 21l3 8 3-8" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/><circle cx="31" cy="14" r="3" stroke={c} strokeWidth="1.5"/><path d="M31 17v4" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M28 21l3 8 3-8" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/></svg>,
    'bracelet-m': <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="20" width="32" height="8" rx="4" stroke={c} strokeWidth="2"/><rect x="36" y="21" width="4" height="6" rx="1" fill={c} opacity="0.6"/></svg>,
    heart: <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M24 38s-14-9-14-19a8 8 0 0116 0 8 8 0 0116 0c0 10-14 19-14 19z" stroke={c} strokeWidth="2" strokeLinejoin="round"/><path d="M20 24h8M24 20v8" stroke={c} strokeWidth="1.5" strokeLinecap="round" opacity="0.5"/></svg>,
  };
  return (
    <div style={{width:'100%',height:'100%',background:bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
      {icons[type] || icons.collar}
    </div>
  );
};

// ─── HEADER ──────────────────────────────────────────────────────────────────
const Header = ({ screen, setScreen, cartCount, setCartOpen }) => {
  const w = useWindowWidth();
  const isMobile = w < 768;
  const [menuOpen, setMenuOpen] = useState(false);
  return (
    <header style={{position:'sticky',top:0,zIndex:100,background:'rgba(253,250,248,0.95)',backdropFilter:'blur(12px)',borderBottom:'1px solid var(--border)'}}>
      <div style={{maxWidth:1200,margin:'0 auto',padding: isMobile ? '0 16px' : '0 32px',height:64,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={() => { setScreen('home'); setMenuOpen(false); }} style={{display:'flex',flexDirection:'column',lineHeight:1,alignItems:'flex-start'}}>
          <span style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize: isMobile ? 18 : 22,letterSpacing:'0.14em',background:'var(--grad-rose)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>CACUSA</span>
          <span style={{fontFamily:'var(--font-script)',fontSize: isMobile ? 11 : 13,color:'var(--muted)',marginTop:-2}}>by Taitus</span>
        </button>
        {isMobile ? (
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={() => setCartOpen(true)} style={{position:'relative',padding:8}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" strokeWidth="1.75" strokeLinecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
              {cartCount > 0 && <span style={{position:'absolute',top:2,right:2,background:'var(--rose)',color:'white',fontSize:9,fontWeight:700,width:16,height:16,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>{cartCount}</span>}
            </button>
            <button onClick={() => setMenuOpen(m => !m)} style={{padding:8}}>
              {menuOpen
                ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                : <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              }
            </button>
          </div>
        ) : (
          <div style={{display:'flex',gap:32,alignItems:'center'}}>
            <nav style={{display:'flex',gap:32}}>
              {[['home','Inicio'],['shop','Tienda'],['collections','Colecciones']].map(([s,l]) => (
                <button key={s} onClick={() => setScreen(s)} style={{fontFamily:'var(--font-sans)',fontSize:13,fontWeight:500,color: screen===s ? 'var(--rose)':'var(--muted)',borderBottom: screen===s ? '1.5px solid var(--rose)':'1.5px solid transparent',paddingBottom:2,transition:'color 0.2s'}}>
                  {l}
                </button>
              ))}
            </nav>
            <div style={{display:'flex',alignItems:'center',gap:16}}>
              <button onClick={() => setCartOpen(true)} style={{position:'relative',padding:8}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" strokeWidth="1.75" strokeLinecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                {cartCount > 0 && <span style={{position:'absolute',top:2,right:2,background:'var(--rose)',color:'white',fontSize:9,fontWeight:700,width:16,height:16,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>{cartCount}</span>}
              </button>
              <button onClick={() => setScreen('shop')} style={{background:'var(--grad-rose)',color:'white',fontFamily:'var(--font-sans)',fontWeight:600,fontSize:12,letterSpacing:'0.05em',borderRadius:999,padding:'8px 20px',boxShadow:'var(--shadow-btn)'}}>
                Personalizar
              </button>
            </div>
          </div>
        )}
      </div>
      {isMobile && menuOpen && (
        <div style={{background:'var(--white)',borderTop:'1px solid var(--border)',padding:'12px 16px 20px'}}>
          {[['home','Inicio'],['shop','Tienda'],['collections','Colecciones']].map(([s,l]) => (
            <button key={s} onClick={() => { setScreen(s); setMenuOpen(false); }} style={{display:'block',width:'100%',textAlign:'left',fontFamily:'var(--font-sans)',fontSize:16,fontWeight: screen===s ? 600 : 400,color: screen===s ? 'var(--rose)':'var(--ink)',padding:'13px 0',borderBottom:'1px solid var(--border)'}}>
              {l}
            </button>
          ))}
          <button onClick={() => { setScreen('shop'); setMenuOpen(false); }} style={{marginTop:16,width:'100%',background:'var(--grad-rose)',color:'white',fontFamily:'var(--font-sans)',fontWeight:600,fontSize:14,borderRadius:999,padding:'13px',boxShadow:'var(--shadow-btn)'}}>
            Personalizar ✨
          </button>
        </div>
      )}
    </header>
  );
};

// ─── HERO ─────────────────────────────────────────────────────────────────────
const HeroSection = ({ setScreen }) => {
  const w = useWindowWidth();
  const isMobile = w < 768;
  return (
    <section style={{position:'relative',overflow:'hidden',display:'flex',alignItems:'center'}}>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg, #FEF0E7 0%, #FCE4EE 30%, #F0E8FC 60%, #E2F3FC 100%)',zIndex:0}} />
      <div style={{position:'absolute',top:-80,right:-80,width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle, rgba(232,80,138,0.12) 0%, transparent 70%)',zIndex:0}} />
      <div style={{position:'absolute',bottom:-60,left:-40,width:380,height:380,borderRadius:'50%',background:'radial-gradient(circle, rgba(176,127,236,0.1) 0%, transparent 70%)',zIndex:0}} />
      <div style={{maxWidth:1200,margin:'0 auto',padding: isMobile ? '48px 20px 36px' : '80px 32px',position:'relative',zIndex:1,width:'100%',display:'grid',gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr',gap: isMobile ? 32 : 64,alignItems:'center'}}>
        <div>
          <div style={{fontFamily:'var(--font-sans)',fontSize:11,fontWeight:600,letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--rose)',marginBottom:16}}>Joyería Artesanal Personalizada</div>
          <h1 style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize: isMobile ? 40 : 56,letterSpacing:'-0.02em',lineHeight:1.05,color:'var(--ink)',marginBottom:16}}>
            Creada<br/>
            <span style={{background:'var(--grad-brand)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>para ti.</span>
          </h1>
          <p style={{fontFamily:'var(--font-serif)',fontSize: isMobile ? 17 : 19,lineHeight:1.65,color:'var(--plum-mid)',marginBottom:12,fontStyle:'italic'}}>
            "creamos para que luzcas más bella de lo que ya eres"
          </p>
          <p style={{fontFamily:'var(--font-sans)',fontSize:15,color:'var(--muted)',lineHeight:1.6,marginBottom:32,maxWidth:420}}>
            Joyería artesanal única, diseñada con amor en Ecuador. Cada pieza lleva tu historia.
          </p>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            <button onClick={() => setScreen('shop')} style={{background:'var(--rose)',color:'white',fontFamily:'var(--font-sans)',fontWeight:600,fontSize:14,letterSpacing:'0.05em',border:'none',borderRadius:999,padding:'14px 32px',boxShadow:'var(--shadow-btn)'}}>
              Ver colección
            </button>
            <button onClick={() => setScreen('shop')} style={{background:'transparent',color:'var(--rose)',fontFamily:'var(--font-sans)',fontWeight:600,fontSize:14,border:'1.5px solid var(--rose)',borderRadius:999,padding:'13px 28px'}}>
              Personaliza →
            </button>
          </div>
          <div style={{display:'flex',gap:20,marginTop:28,alignItems:'center',flexWrap:'wrap'}}>
            {[['Ecuador & USA','🌎'],['Envío express','📦'],['Hecho a mano','✨']].map(([l,e]) => (
              <div key={l} style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:14}}>{e}</span>
                <span style={{fontFamily:'var(--font-sans)',fontSize:12,color:'var(--muted)'}}>{l}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap: isMobile ? 10 : 16}}>
          {PRODUCTS.slice(0,4).map((p,i) => (
            <div key={p.id} style={{borderRadius:20,overflow:'hidden',boxShadow:'var(--shadow-card)',background:'white',transform: !isMobile && i%2===1 ? 'translateY(24px)' : 'none'}}>
              <div style={{height: isMobile ? 90 : 120}}><ProductIllustration type={p.img} color={p.color}/></div>
              <div style={{padding:'10px 12px'}}>
                <div style={{fontFamily:'var(--font-serif)',fontSize:13,color:'var(--ink)'}}>{p.name}</div>
                <div style={{fontFamily:'var(--font-sans)',fontSize:12,fontWeight:600,color:'var(--gold)',marginTop:2}}>${p.price}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

// ─── PRODUCT CARD ─────────────────────────────────────────────────────────────
const ProductCard = ({ product, onSelect, addToCart }) => {
  const [hovered, setHovered] = useState(false);
  const tagColors = { Bestseller:{bg:'#2D1B2E',color:'white'}, Nuevo:{bg:'var(--rose-pale)',color:'var(--rose)'} };
  const tc = tagColors[product.tag] || {};
  return (
    <div onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{background:'white',borderRadius:16,overflow:'hidden',boxShadow: hovered ? 'var(--shadow-hover)' : 'var(--shadow-card)',transform: hovered ? 'translateY(-4px)' : 'none',transition:'all 0.3s ease',cursor:'pointer'}}>
      <div style={{height:180,position:'relative'}} onClick={() => onSelect(product)}>
        {product.imageUrl
          ? <img src={product.imageUrl} alt={product.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          : <ProductIllustration type={product.img} color={product.color}/>
        }
        {product.tag && <span style={{position:'absolute',top:12,left:12,background:tc.bg,color:tc.color,fontSize:9,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',borderRadius:999,padding:'4px 10px'}}>{product.tag}</span>}
        {product.personalized && <span style={{position:'absolute',top:12,right:12,background:'rgba(255,255,255,0.9)',fontSize:9,fontWeight:600,color:'var(--violet-deep)',borderRadius:999,padding:'4px 8px'}}>Personalizable</span>}
      </div>
      <div style={{padding:'14px 16px'}}>
        <div style={{fontFamily:'var(--font-sans)',fontSize:10,fontWeight:600,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--rose)',marginBottom:4}}>{product.category}</div>
        <div style={{fontFamily:'var(--font-serif)',fontSize:17,color:'var(--ink)',marginBottom:6}}>{product.name}</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
          <div>
            <span style={{fontFamily:'var(--font-sans)',fontSize:15,fontWeight:600,color:'var(--gold)'}}>${product.price}</span>
            {product.oldPrice && <span style={{fontFamily:'var(--font-sans)',fontSize:12,color:'var(--subtle)',textDecoration:'line-through',marginLeft:6}}>${product.oldPrice}</span>}
          </div>
          <button onClick={(e) => { e.stopPropagation(); addToCart(product); }} style={{background:'var(--rose-pale)',color:'var(--rose)',fontFamily:'var(--font-sans)',fontWeight:600,fontSize:11,borderRadius:999,padding:'7px 14px',whiteSpace:'nowrap'}}>
            + Añadir
          </button>
        </div>
      </div>
    </div>
  );
};

// ─── SHOP SCREEN ─────────────────────────────────────────────────────────────
const ShopScreen = ({ setSelected, addToCart }) => {
  const w = useWindowWidth();
  const isMobile = w < 640;
  const isTablet = w < 1024;
  const cols = isMobile ? '1fr' : isTablet ? 'repeat(2,1fr)' : 'repeat(3,1fr)';
  const [filter, setFilter] = useState('all');
  const filtered = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === filter || p.category.startsWith(filter));
  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding: isMobile ? '32px 16px' : '48px 32px'}}>
      <div style={{textAlign:'center',marginBottom:40}}>
        <div style={{fontFamily:'var(--font-sans)',fontSize:11,fontWeight:600,letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--rose)',marginBottom:12}}>Nuestra colección</div>
        <h2 style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize: isMobile ? 28 : 40,color:'var(--ink)',marginBottom:12}}>Encuentra tu pieza</h2>
        <p style={{fontFamily:'var(--font-serif)',fontSize:18,color:'var(--muted)',fontStyle:'italic'}}>Cada joya cuenta una historia única</p>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:40,flexWrap:'wrap'}}>
        {COLLECTIONS.map(c => (
          <button key={c.id} onClick={() => setFilter(c.id)} style={{fontFamily:'var(--font-sans)',fontSize:13,fontWeight:500,padding:'8px 20px',borderRadius:999,border:`1.5px solid ${filter===c.id ? 'var(--rose)' : 'var(--border)'}`,background: filter===c.id ? 'var(--rose)' : 'white',color: filter===c.id ? 'white' : 'var(--muted)',transition:'all 0.2s'}}>
            {c.label}
          </button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:cols,gap: isMobile ? 16 : 24}}>
        {filtered.map(p => <ProductCard key={p.id} product={p} onSelect={setSelected} addToCart={addToCart}/>)}
      </div>
    </div>
  );
};

// ─── PRODUCT DETAIL ───────────────────────────────────────────────────────────
const ProductDetail = ({ product, addToCart, setScreen }) => {
  const w = useWindowWidth();
  const isMobile = w < 768;
  const [personText, setPersonText] = useState('');

// ─── APP ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = useState(() => localStorage.getItem('cacusa-screen') || 'home');
  const [selected, setSelected] = useState(null);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [, _tick] = useState(0); // used to trigger re-render after product fetch


  useEffect(()=>{ localStorage.setItem('cacusa-screen',screen); },[screen]);

  useEffect(()=>{
    fetch(PRODUCTS_JSON_URL+'?_='+Date.now())
      .then(r=>r.json())
      .then(d=>{
        const live=(d.products||[]).filter(p=>p.available!==false);
        if(live.length){PRODUCTS=live;_tick(n=>n+1);} if(d.whatsapp) WHATSAPP_NUMBER=d.whatsapp;
      })
      .catch(()=>{});
  },[]);


  const addToCart = (product) => { setCart(c => [...c, product]); setCartOpen(true); };
  const removeItem = (i) => setCart(c => c.filter((_,idx) => idx !== i));
  const goDetail = (p) => { setSelected(p); setScreen('detail'); };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Header screen={screen} setScreen={setScreen} cartCount={cart.length} setCartOpen={setCartOpen}/>
      <main style={{flex:1}}>
        {screen === 'home' && <HomeScreen setScreen={setScreen} setSelected={goDetail} addToCart={addToCart}/>}
        {screen === 'shop' && <ShopScreen setSelected={goDetail} addToCart={addToCart}/>}
        {screen === 'detail' && selected && <ProductDetail product={selected} addToCart={addToCart} setScreen={setScreen}/>}
        {screen === 'collections' && <CollectionsScreen setSelected={goDetail} setScreen={setScreen} addToCart={addToCart}/>}
      </main>
      <Footer/>
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} items={cart} removeItem={removeItem}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
