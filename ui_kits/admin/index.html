// ── Utils ──────────────────────────────────────────────────────────────────
const sha256 = async str => {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
};
function strToB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i += 8192) bin += String.fromCharCode(...bytes.subarray(i, i + 8192));
  return btoa(bin);
}
function b64ToStr(b64) {
  const bin = atob(b64.replace(/\n/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

async function apiCall(endpoint, payload) {
  const r = await fetch(`${ADMIN_API}/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload || {})
  });
  let data = {};
  try { data = await r.json(); } catch (_) {}
  if (!r.ok) { const e = new Error(data.error || `Error ${r.status}`); e.status = r.status; throw e; }
  return data;
}

// ── WebAuthn (Face ID / biometría) ────────────────────────────────────────────
function _waSupported() { return !!(window.PublicKeyCredential && navigator.credentials); }
function _waHasCred(u)  { return !!localStorage.getItem(`cacusa_wa:${u}`); }
function _waB64d(s) {
  s = s.replace(/-/g,'+').replace(/_/g,'/'); while (s.length%4) s+='=';
  const b=atob(s), a=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++) a[i]=b.charCodeAt(i); return a;
}
function _waB64e(buf) {
  const a=buf instanceof Uint8Array?buf:new Uint8Array(buf); let s='';
  for(let i=0;i<a.length;i++) s+=String.fromCharCode(a[i]);
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function _waRegister(token, username) {
  const ch = await apiCall('webauthn/reg-challenge', { token });
  const cred = await navigator.credentials.create({ publicKey: {
    challenge: _waB64d(ch.challenge),
    rp: { id: ch.rpId, name: ch.rpName },
    user: { id: new TextEncoder().encode(username), name: username, displayName: USERS[username].name },
    pubKeyCredParams: [{ type:'public-key', alg:-7 }, { type:'public-key', alg:-257 }],
    authenticatorSelection: { authenticatorAttachment:'platform', userVerification:'preferred', residentKey:'discouraged' },
    timeout: 60000, attestation: 'none',
    excludeCredentials: (ch.excludeIds||[]).map(id => ({ id:_waB64d(id), type:'public-key' })),
  }});
  await apiCall('webauthn/register', {
    token, challenge: ch.challenge,
    credentialId: _waB64e(new Uint8Array(cred.rawId)),
    attestationObject: _waB64e(new Uint8Array(cred.response.attestationObject)),
    clientDataJSON: _waB64e(new Uint8Array(cred.response.clientDataJSON)),
  });
  localStorage.setItem(`cacusa_wa:${username}`, _waB64e(new Uint8Array(cred.rawId)));
}
async function _waLogin(username) {
  const ch = await apiCall('webauthn/login-challenge', { user: username });
  const a = await navigator.credentials.get({ publicKey: {
    challenge: _waB64d(ch.challenge),
    allowCredentials: [{ id:_waB64d(ch.credentialId), type:'public-key' }],
    rpId: ch.rpId, userVerification: 'preferred', timeout: 60000,
  }});
  return apiCall('webauthn/login', {
    challenge: ch.challenge,
    credentialId: _waB64e(new Uint8Array(a.rawId)),
    authenticatorData: _waB64e(new Uint8Array(a.response.authenticatorData)),
    clientDataJSON: _waB64e(new Uint8Array(a.response.clientDataJSON)),
    signature: _waB64e(new Uint8Array(a.response.signature)),
  });
}

// Traduce texto de español a inglés vía MyMemory (gratis, sin API key)
async function translateToEn(text) {
  if (!text || !text.trim()) return '';
  try {
    const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text.trim()) + '&langpair=es|en');
    const data = await res.json();
    return data?.responseData?.translatedText || text;
  } catch (_) { return text; }
}
// Traduce el bloque "texts" (cabecera de la tienda) al inglés
async function translateTextsBlock(texts) {
  const t = async s => s ? await translateToEn(s) : '';
  return {
    heroLabel: await t(texts.heroLabel),
    heroTitle: await t(texts.heroTitle),
    heroSubtitle: texts.heroSubtitle,   // "by Taitus" — marca, no se traduce
    instagram: texts.instagram,         // @usuario — no se traduce
    perks: await Promise.all((texts.perks || []).map(p => translateToEn(p)))
  };
}
// Traduce el bloque "home" (Quiénes somos / Personalización / testimonios)
async function translateHomeBlock(home) {
  const t = async s => s ? await translateToEn(s) : '';
  const person = home.person || {};
  return {
    storyLabel: await t(home.storyLabel),
    storyTitle: await t(home.storyTitle),
    storyQuote: await t(home.storyQuote),
    storyBody:  await t(home.storyBody),
    stats: await Promise.all((home.stats || []).map(async s => ({ num: s.num, label: await translateToEn(s.label) }))),
    person: {

      title:    await t(person.title),
      subtitle: await t(person.subtitle),
      steps: await Promise.all((person.steps || []).map(async st => ({ title: await translateToEn(st.title), desc: await translateToEn(st.desc) })))
    },
    testimonials: await Promise.all((home.testimonials || []).map(async x => ({ t: await translateToEn(x.t), n: x.n, l: x.l }))),
    footer: {
      tagline:   await t(home.footer && home.footer.tagline),
      copyright: await t(home.footer && home.footer.copyright)
    }
  };
}
// Traduce el bloque "pages" (envíos / devoluciones / cuidados)
async function translatePagesBlock(pages) {
  const out = {};
  for (const [pk, pv] of Object.entries(pages || {})) {
    const page = {};
    for (const [k, v] of Object.entries(pv || {})) {
      page[k] = (typeof v === 'string' && v.trim()) ? await translateToEn(v) : v;
    }
    out[pk] = page;
  }
  return out;
}

function compressImage(file, maxPx = 900) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > maxPx || h > maxPx) {
        if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else        { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      cv.toBlob(blob => {
        const fr = new FileReader();
        fr.onload = e => resolve(e.target.result.split(',')[1]);
        fr.readAsDataURL(blob);
      }, 'image/jpeg', 0.88);
    };
    img.src = url;
  });
}

    ring:        <g><circle cx="50" cy="52" r="22" fill="none" stroke={c} strokeWidth="7"/><path d="M34 39 Q50 29 66 39" stroke={c} strokeWidth="3" fill="none"/><circle cx="50" cy="30" r="8" fill={c}/></g>,
    bracelet:    <g><path d="M18 56 Q36 34 50 32 Q64 34 82 56" stroke={c} strokeWidth="6" fill="none" strokeLinecap="round"/><circle cx="50" cy="32" r="9" fill={c}/></g>,
    earrings:    <g><circle cx="34" cy="34" r="8" fill={c}/><path d="M34 42 Q26 58 28 72" stroke={c} strokeWidth="3" fill="none"/><circle cx="28" cy="74" r="7" fill={c} opacity=".75"/><circle cx="66" cy="34" r="8" fill={c}/><path d="M66 42 Q58 58 60 72" stroke={c} strokeWidth="3" fill="none"/><circle cx="60" cy="74" r="7" fill={c} opacity=".75"/></g>,
    heart:       <g><path d="M50 76 L18 50 Q12 30 33 27 Q50 26 50 44 Q50 26 67 27 Q88 30 82 50 Z" fill={c}/></g>,
    'bracelet-m':<g><rect x="16" y="42" width="68" height="16" rx="8" fill={c}/><rect x="20" y="47" width="9" height="6" rx="1.5" fill="rgba(0,0,0,.18)"/><rect x="33" y="47" width="9" height="6" rx="1.5" fill="rgba(0,0,0,.18)"/><rect x="46" y="47" width="9" height="6" rx="1.5" fill="rgba(0,0,0,.18)"/></g>,
    necklace:    <g><path d="M14 30 Q50 82 86 30" stroke={c} strokeWidth="3.5" fill="none"/><circle cx="50" cy="74" r="11" fill={c}/></g>
  };
  return <svg viewBox="0 0 100 100" style={{ width: '100%', height: '100%', background: `${c}20` }}>{shapes[type] || shapes.collar}</svg>;
}

// ── Login ──────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState('tita.jaramillo');
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);
  const [waAvail, setWaAvail]   = useState(false);
  const [pendingSess, setPending] = useState(null); // sesión esperando activar Face ID

  React.useEffect(() => {
    setWaAvail(_waSupported() && _waHasCred(username));
  }, [username]);

  const submit = async e => {
    e.preventDefault(); setLoading(true); setError('');
    try {
      const data = await apiLogin(username, password);
      const sess = { username, name: USERS[username].name, token: data.token };
      if (_waSupported() && !_waHasCred(username)) {
        setPending(sess); // ofrecer activar Face ID
      } else {
        onLogin(sess);
      }
    } catch (e) {
      setError(e.status === 401 ? 'Usuario o contraseña incorrectos.' : (e.message || 'No se pudo conectar con el servidor.'));
    } finally { setLoading(false); }
  };

  const loginFaceId = async () => {
    setLoading(true); setError('');
    try {
      const data = await _waLogin(username);
      onLogin({ username, name: USERS[username].name, token: data.token });
    } catch (e) {
      if (e.name === 'NotAllowedError') setError('Autenticación cancelada.');
      else setError(e.message || 'Error de autenticación biométrica.');
    } finally { setLoading(false); }
  };

  const activarFaceId = async () => {
    setLoading(true);
    try { await _waRegister(pendingSess.token, pendingSess.username); } catch (_) {}
    onLogin(pendingSess);
  };

  const inp = { padding: '11px 14px', border: '1.5px solid #e0e0e0', borderRadius: 10, fontSize: 14, outline: 'none', width: '100%', boxSizing: 'border-box' };
  const lbl = { display: 'block', fontSize: 11, fontWeight: 600, color: '#777', letterSpacing: '.12em', textTransform: 'uppercase', marginBottom: 6 };
  const card = { width: 400, background: 'white', borderRadius: 28, padding: '44px 40px', boxShadow: '0 32px 80px rgba(0,0,0,.45)', animation: 'fadeIn .4s ease' };
  const wrap = { minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#1A1124 0%,#2D1B2E 55%,#1A1124 100%)' };

  if (pendingSess) return (
    <div style={wrap}>
      <div style={{ ...card, textAlign: 'center' }}>
        <div style={{ fontSize: 52, marginBottom: 12 }}>🔐</div>
        <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Activar acceso biométrico</div>
        <div style={{ fontSize: 14, color: '#666', marginBottom: 28 }}>¿Usar Face ID o huella la próxima vez?</div>
        <button onClick={activarFaceId} disabled={loading}
          style={{ width:'100%', padding:14, background:'linear-gradient(135deg,#E85D8A,#9B5DE5)', color:'white', borderRadius:99, fontWeight:700, fontSize:15, marginBottom:10, opacity:loading?.7:1, border:'none', cursor:'pointer' }}>
          {loading ? 'Configurando…' : 'Activar Face ID'}
        </button>
        <button onClick={() => onLogin(pendingSess)}
          style={{ width:'100%', padding:12, background:'none', border:'1.5px solid #e0e0e0', borderRadius:99, fontWeight:500, fontSize:14, color:'#888', cursor:'pointer' }}>
          Ahora no
        </button>
      </div>
    </div>
  );

  return (
    <div style={wrap}>
      <div style={card}>
        <div style={{ textAlign: 'center', marginBottom: 36 }}>
          <div style={{ fontFamily: 'Georgia,serif', fontSize: 34, fontWeight: 900, letterSpacing: '.15em', background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>CACUSA</div>
          <div style={{ fontFamily: 'Georgia,serif', fontSize: 13, color: '#aaa', fontStyle: 'italic', marginTop: 3 }}>Panel de Administración</div>
        </div>
        <form onSubmit={submit}>
          <div style={{ marginBottom: 16 }}>
            <label style={lbl}>Usuario</label>
            <select value={username} onChange={e => setUsername(e.target.value)} style={{ ...inp, background: 'white', cursor: 'pointer' }}>
              {Object.entries(USERS).map(([k, v]) => <option key={k} value={k}>{v.avatar} {v.name}</option>)}
            </select>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={lbl}>Contraseña</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Contraseña" required style={inp} />
          </div>
          <div style={{ marginBottom: 8 }} />
          {error && <div style={{ background: '#FEE2E2', color: '#DC2626', borderRadius: 10, padding: '10px 14px', fontSize: 13, marginBottom: 16, fontWeight: 500 }}>{error}</div>}
          <button type="submit" disabled={loading}
            style={{ width: '100%', padding: 14, background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', color: 'white', borderRadius: 99, fontWeight: 700, fontSize: 15, letterSpacing: '.04em', boxShadow: '0 4px 20px rgba(155,93,229,.4)', opacity: loading ? .7 : 1, transition: 'opacity .2s', border: 'none', cursor: 'pointer' }}>
            {loading ? 'Verificando…' : 'Ingresar →'}
          </button>
        </form>
        {waAvail && (
          <button onClick={loginFaceId} disabled={loading}
            style={{ width:'100%', padding:13, marginTop:12, background:'#F8F8FF', border:'1.5px solid #e8e0ff', borderRadius:99, fontWeight:600, fontSize:14, color:'#5a3fa0', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
            <span style={{ fontSize:20 }}>🔐</span> Ingresar con Face ID
          </button>
        )}
      </div>
    </div>
  );
}

// ── Image Editor (drag to pan + +/- zoom) ──────────────────────────────────
function ImageEditor({ imgSrc, focalX, focalY, zoom, onChange }) {
  const ref  = React.useRef(null);
  const drag = React.useRef(null);
  const fx = focalX ?? 50, fy = focalY ?? 50, z = zoom ?? 1;

  const startDrag = (cx, cy) => { drag.current = { cx, cy, fx, fy }; };
  const moveDrag  = (cx, cy) => {
    if (!drag.current || !ref.current) return;
    const w = ref.current.offsetWidth, h = ref.current.offsetHeight;
    onChange({
      focalX: Math.max(0, Math.min(100, drag.current.fx - ((cx - drag.current.cx) / w) * 100)),
      focalY: Math.max(0, Math.min(100, drag.current.fy - ((cy - drag.current.cy) / h) * 100))
    });
  };
  const endDrag = () => { drag.current = null; };

  const btnStyle = { width: 40, height: 40, borderRadius: 10, border: '1.5px solid #e0e0e0', background: 'white', fontSize: 22, fontWeight: 700, color: '#555', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, userSelect: 'none' };

  return (
    <div>
      <div ref={ref}
        style={{ width: '100%', height: 220, overflow: 'hidden', borderRadius: 12, cursor: drag.current ? 'grabbing' : 'grab', touchAction: 'none', userSelect: 'none', position: 'relative', background: '#eee' }}
        onMouseDown={e => { startDrag(e.clientX, e.clientY); e.preventDefault(); }}
        onMouseMove={e => moveDrag(e.clientX, e.clientY)}
        onMouseUp={endDrag} onMouseLeave={endDrag}
        onTouchStart={e => { startDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }}
        onTouchMove={e => { moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }}
        onTouchEnd={endDrag}
      >
        <img src={imgSrc} draggable={false}
          style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: `${fx}% ${fy}%`, transform: `scale(${z})`, transformOrigin: `${fx}% ${fy}%`, pointerEvents: 'none', display: 'block' }}
        />
        <div style={{ position: 'absolute', top: 8, right: 8, background: 'rgba(0,0,0,.45)', color: 'white', fontSize: 11, borderRadius: 6, padding: '3px 8px', fontFamily: 'sans-serif', fontWeight: 600 }}>
          {Math.round(z * 100)}%
        </div>
        <div style={{ position: 'absolute', bottom: 8, left: 0, right: 0, textAlign: 'center', color: 'rgba(255,255,255,.8)', fontSize: 10, fontFamily: 'sans-serif', pointerEvents: 'none' }}>
          ✥ Arrastra para mover
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 10 }}>
        <button style={btnStyle} onClick={() => onChange({ zoom: Math.max(0.5, parseFloat((z - 0.15).toFixed(2))) })}>−</button>
        <div style={{ flex: 1, textAlign: 'center', fontSize: 12, color: '#888' }}>🔍 Zoom</div>
        <button style={btnStyle} onClick={() => onChange({ zoom: Math.min(3, parseFloat((z + 0.15).toFixed(2))) })}>+</button>
      </div>
    </div>
  );
}

// ── Product Modal ──────────────────────────────────────────────────────────
function ProductModal({ product, onSave, onClose, token, categories, materials, fbSurcharges = {}, fbMarkets = {} }) {
  const cats = (categories && categories.length) ? categories : DEFAULT_CATEGORIES;
  const mats = (materials && materials.length) ? materials : DEFAULT_MATERIALS;
  const isNew = !product?.id;
  const initMkt = product ? (fbMarkets[product.id] || 'both') : 'both';
  const blank = { name: '', category: cats[0], price: '', oldPrice: '', img: 'collar', color: 'rose', tag: '', description: '', personalized: false, available: true, imageUrl: '', focalX: 50, focalY: 50, zoom: 1, material: mats[0], surcharge: false, marketEC: true, marketUS: true, promoEnabled: false, promoPrice: '', promoLabel: 'Oferta', promoEndsAt: '', images: [] };
  const [form, setForm] = useState(product
    ? { ...product, images: product.images || [], tag: product.tag || '', oldPrice: product.oldPrice || '', surcharge: !!fbSurcharges[product.id], marketEC: initMkt !== 'us', marketUS: initMkt !== 'ec', promoEnabled: !!(product.promo && product.promo.price), promoPrice: (product.promo && product.promo.price) || '', promoLabel: (product.promo && product.promo.label) || 'Oferta', promoEndsAt: (product.promo && product.promo.endsAt) || '' }
    : blank);
  const [imgPrev, setImgPrev] = useState(product?.imageUrl || '');
  const [uploading, setUploading] = useState(false);
  const [uploadMsg, setUploadMsg] = useState('');
  const [dragOver, setDragOver] = useState(false);
  const [translating, setTranslating] = useState(false);
  const fileRef = useRef();
  const galleryFileRef = useRef();
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const [galleryUploading, setGalleryUploading] = useState(false);
  const [galleryMsg, setGalleryMsg] = useState('');
  const [reviews, setReviews] = useState(null);
  const [revLoading, setRevLoading] = useState(false);

  const uploadFile = async file => {
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      setUploadMsg('❌ Ese archivo no es una imagen. Usa JPG, PNG o WebP.');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      setUploadMsg('❌ La imagen es muy pesada (máx 10MB). Toma otra foto.');
      return;
    }
    setUploading(true); setUploadMsg('');
    try {
      setImgPrev(URL.createObjectURL(file));
      const b64 = await compressImage(file);
      const slug = file.name.replace(/[^a-z0-9]+/gi, '_').toLowerCase().substring(0, 40) || 'foto';
      const fname = `${Date.now()}_${slug}.jpg`;
      const path = `${IMAGES_PATH}/${fname}`;
      const res = await apiUpload(token, path, b64, `Imagen: ${fname}`);
      set('imageUrl', res.url);
      setUploadMsg('✅ Foto subida correctamente');
    } catch (e) {
      setUploadMsg(e.status === 401 ? '⚠️ Sesión expirada. Cierra sesión y vuelve a entrar.' : '❌ Error al subir: ' + e.message);
      setImgPrev(form.imageUrl || '');
    } finally { setUploading(false); }
  };

  const handleFile = e => uploadFile(e.target.files[0]);
  const handleDrop = e => {
    e.preventDefault(); setDragOver(false);
    uploadFile(e.dataTransfer.files[0]);
  };

  const uploadGalleryFile = async file => {
    if (!file) return;
    if (!file.type.startsWith('image/')) { setGalleryMsg('❌ No es una imagen válida.'); return; }
    if (file.size > 10 * 1024 * 1024) { setGalleryMsg('❌ Muy pesada (máx 10MB).'); return; }
    setGalleryUploading(true); setGalleryMsg('');
    try {
      const b64 = await compressImage(file);
      const slug = file.name.replace(/[^a-z0-9]+/gi, '_').toLowerCase().substring(0, 40) || 'extra';
      const fname = `${Date.now()}_${slug}.jpg`;
      const res = await apiUpload(token, `${IMAGES_PATH}/${fname}`, b64, `Imagen galería: ${fname}`);
      setForm(f => ({ ...f, images: [...(f.images || []), res.url] }));
      setGalleryMsg('✅ Foto agregada a la galería');
    } catch (e) {
      setGalleryMsg('❌ Error al subir: ' + e.message);
    } finally { setGalleryUploading(false); }
  };

  const loadReviews = async () => {
    if (!product?.id) return;
    setRevLoading(true);
    try {
      await _fbSignIn();
      const url = _fbUrl(`https://cacusa-pos-default-rtdb.firebaseio.com/cacusa_reviews/${product.id}.json`);
      const res = await fetch(url);
      if (!res.ok) { setReviews([]); setRevLoading(false); return; }
      const data = await res.json();
      setReviews(data && typeof data === 'object' && !data.error ? Object.entries(data).map(([key, val]) => ({ key, ...val })) : []);
    } catch(_) { setReviews([]); }
    setRevLoading(false);
  };

  const deleteReview = async key => {
    try {
      await _fbSignIn();
      await fetch(_fbUrl(`https://cacusa-pos-default-rtdb.firebaseio.com/cacusa_reviews/${product.id}/${key}.json`), { method: 'DELETE' });
      setReviews(r => r.filter(x => x.key !== key));
    } catch(_) { alert('Error al eliminar la reseña'); }
  };

  const save = async () => {
    if (!form.name.trim() || !form.price) return;
    setTranslating(true);
    let name_en = form.name_en || '';
    let description_en = form.description_en || '';
    try {
      [name_en, description_en] = await Promise.all([
        translateToEn(form.name),
        translateToEn(form.description || '')
      ]);
    } catch (_) {}
    setTranslating(false);
    const market = (form.marketEC && form.marketUS) || (!form.marketEC && !form.marketUS) ? 'both' : form.marketEC ? 'ec' : 'us';
    const promo = form.promoEnabled && form.promoPrice
      ? { price: Number(form.promoPrice), label: form.promoLabel || 'Oferta', endsAt: form.promoEndsAt || null }
      : null;
    onSave({
      ...form,
      name_en,
      description_en,
      id: form.id || Date.now(),
      price: Number(form.price),
      oldPrice: form.oldPrice ? Number(form.oldPrice) : null,
      tag: form.tag || null,
      available: form.available !== false,
      surcharge: !!form.surcharge,
      market,
      promo
    });
  };

  const inp = { padding: '10px 13px', border: '1.5px solid #e4e4e4', borderRadius: 10, fontSize: 14, outline: 'none', width: '100%', boxSizing: 'border-box', background: 'white' };
  const lbl = { display: 'block', fontSize: 11, fontWeight: 600, color: '#777', letterSpacing: '.11em', textTransform: 'uppercase', marginBottom: 5 };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(26,17,36,.65)', zIndex: 1000, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '20px 16px', overflowY: 'auto' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: 'white', borderRadius: 24, padding: '32px 28px', width: '100%', maxWidth: 540, boxShadow: '0 24px 80px rgba(0,0,0,.35)', marginTop: 20, animation: 'fadeIn .3s ease' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: '#1a1a1a' }}>{isNew ? '➕ Nuevo Producto' : '✏️ Editar Producto'}</h2>
          <button onClick={onClose} style={{ width: 34, height: 34, borderRadius: '50%', background: '#f0f0f0', color: '#666', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', border: 'none', cursor: 'pointer' }}>✕</button>
        </div>

        {/* Image upload */}
        <div style={{ marginBottom: 20 }}>
          <label style={lbl}>Foto del Producto</label>
          <div onClick={() => !uploading && fileRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={e => { e.preventDefault(); setDragOver(false); }}
            onDrop={handleDrop}
            style={{ height: 160, borderRadius: 14, border: dragOver ? '2px dashed #9B5DE5' : '2px dashed #e0e0e0', cursor: uploading ? 'wait' : 'pointer', overflow: 'hidden', background: dragOver ? '#F6F0FE' : '#fafafa', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', transition: 'border-color .2s, background .2s' }}>
            {imgPrev
              ? <img src={imgPrev} style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: `${form.focalX ?? 50}% ${form.focalY ?? 50}%`, transform: `scale(${form.zoom ?? 1})`, transformOrigin: `${form.focalX ?? 50}% ${form.focalY ?? 50}%` }} alt="preview" />

              {!revLoading && reviews && reviews.map(r => (

// ── Quagga2 loader (para escaneo de códigos de barra lineales en iOS) ─────────
let _quaggaPromise = null;
function loadQuagga() {
  if (_quaggaPromise) return _quaggaPromise;
  _quaggaPromise = new Promise((resolve, reject) => {
    const existing = window.Quagga?.default ?? window.Quagga;
    if (existing?.decodeSingle) { resolve(existing); return; }
    const s = document.createElement('script');
    // Versión fijada + SRI para evitar manipulación de la cadena de suministro (jsdelivr)
    s.src = 'https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js';
    s.integrity = 'sha384-IkRTkdAeAAAqE2ct5zNAfMiX8+H35pGJp8j7+ZFwh7PKaJh5eunsOFAb9l6Z9R7r';
    s.crossOrigin = 'anonymous';
    s.onload = () => {
      const Q = window.Quagga?.default ?? window.Quagga;
      Q?.decodeSingle ? resolve(Q) : reject(new Error('Quagga API not found'));
    };
    s.onerror = () => reject(new Error('Quagga failed to load'));
    document.head.appendChild(s);
  });
  return _quaggaPromise;
}

// ── Order Card ─────────────────────────────────────────────────────────────
function OrderCard({ order, onStatusChange, onDelete, onTrackingChange, onCarrierChange }) {
  const dateStr = new Date(order.fecha).toLocaleDateString('es-EC', { day: '2-digit', month: 'short', year: 'numeric' });
  const estado = order.estado || 'Nuevo';
  const nextIdx = Math.min(ORDER_STATES.indexOf(estado) + 1, ORDER_STATES.length - 2);
  const nextState = ORDER_STATES[nextIdx];
  const waNum = ((order.cliente && order.cliente.telefono) || '').replace(/[^0-9]/g, '');
  const [trackVal, setTrackVal]     = React.useState(order.tracking || '');
  const [carrierVal, setCarrierVal] = React.useState(order.carrier || '');
  const [scanErr, setScanErr]       = React.useState('');
  const scanInputRef = React.useRef(null);
  React.useEffect(() => { setTrackVal(order.tracking || ''); }, [order.tracking]);
  React.useEffect(() => { setCarrierVal(order.carrier || ''); }, [order.carrier]);

  const handleTrackChange   = v => { setTrackVal(v);   onTrackingChange && onTrackingChange(order, v); };
  const handleCarrierChange = v => { setCarrierVal(v); onCarrierChange  && onCarrierChange(order, v); };

  const handleScanFile = async e => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    setScanErr('');
    // BarcodeDetector nativo (Chrome/Android/Safari 17+)
    if ('BarcodeDetector' in window) {
      try {
        const supported = await BarcodeDetector.getSupportedFormats().catch(() => []);
        const want = ['code_128','code_39','qr_code','ean_13','ean_8','upc_e','itf','data_matrix','pdf417'];
        const formats = supported.length ? want.filter(f => supported.includes(f)) : want;
        if (formats.length > 0) {
          const bitmap = await createImageBitmap(file);
          const detector = new BarcodeDetector({ formats });
          const results = await detector.detect(bitmap);
          if (results.length > 0) { handleTrackChange(results[0].rawValue); return; }
        }
      } catch {}
    }
    // Fallback Quagga2 (iOS Safari + cualquier navegador — diseñado para Code 128)
    try {
      setScanErr('Leyendo código…');
      const Quagga = await loadQuagga();
      const dataUrl = await new Promise((res, rej) => {
        const fr = new FileReader();
        fr.onload = () => res(fr.result);
        fr.onerror = rej;
        fr.readAsDataURL(file);
      });
      const code = await new Promise((res, rej) => {
        const t = setTimeout(() => rej(new Error('timeout')), 12000);
        Quagga.decodeSingle({
          src: dataUrl,
          numOfWorkers: 0,
          inputStream: { size: 800 },
          decoder: { readers: ['code_128_reader', 'ean_reader', 'ean_8_reader', 'code_39_reader', 'upc_reader', 'upc_e_reader'] },
          locate: true
        }, result => { clearTimeout(t); result?.codeResult ? res(result.codeResult.code) : rej(new Error('nf')); });
      });
      handleTrackChange(code);
      setScanErr('');
    } catch {
      setScanErr('No se detectó código. Acerca más la cámara e intenta de nuevo.');
    }
  };

  const buildStatusWaUrl = () => {
    const nombre = (order.cliente && order.cliente.nombre) || 'Cliente';
    const num = order.numero ? ' *#' + order.numero + '*' : '';
    const carrierLine = carrierVal ? ' vía *' + carrierVal + '*' : '';
    const trackLine = trackVal ? '\n📦 *Tracking' + carrierLine + ':* ' + trackVal : (carrierVal ? '\n🚛 *Transportista:* ' + carrierVal : '');
    const STATE_MSG = {
      'Confirmado':  '✅ Tu pedido ha sido *confirmado*. Estamos preparando todo con mucho cariño.',
      'En proceso':  '🔨 Tu pedido está *en proceso de elaboración*. Cada pieza se hace a mano especialmente para ti.',
      'Enviado':     '🚚 ¡Tu pedido ya fue *enviado*! Pronto llegará a tus manos.' + trackLine,
      'Entregado':   '🎉 Tu pedido fue *entregado*. ¡Esperamos que lo ames!',
      'Cancelado':   'Tu pedido ha sido *cancelado*. Si tienes preguntas, escríbenos.',
    };
    const stateMsg = STATE_MSG[estado] || 'Tu pedido está en estado: *' + estado + '*.';
    const numLine = order.numero ? '🧾 *Pedido' + num + '*\n' : '';
    const msg = 'Hola ' + nombre + '! 🌸\n' + numLine + stateMsg + '\n\nGracias por confiar en *CACUSA by Taitus* 💕';
    return waNum ? 'https://wa.me/' + waNum + '?text=' + encodeURIComponent(msg) : null;
  };
  const waStatusUrl = buildStatusWaUrl();

  return (
    <div style={{ background: 'white', borderRadius: 16, padding: 18, boxShadow: '0 2px 12px rgba(0,0,0,0.07)', border: '1px solid #f0ecf0', display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 15, color: '#1A1118' }}>{(order.cliente && order.cliente.nombre) || 'Cliente'}</div>
          <div style={{ fontSize: 12, color: '#7A6880', marginTop: 2 }}>{order.cliente && order.cliente.telefono} · {order.cliente && order.cliente.ciudad}</div>
          {(order.cliente?.direccion || order.cliente?.estado || order.cliente?.zip) && (
            <div style={{ fontSize: 12, color: '#7A6880', marginTop: 2 }}>
              📍 {[order.cliente?.direccion, order.cliente?.estado, order.cliente?.zip, order.cliente?.pais].filter(Boolean).join(', ')}
            </div>
          )}
          {order.cliente?.email && <div style={{ fontSize: 12, color: '#7A6880', marginTop: 2 }}>✉️ {order.cliente.email}</div>}
        </div>
        <span style={{ background: STATE_COLORS[estado] || '#E8508A', color: 'white', fontSize: 11, fontWeight: 700, padding: '4px 10px', borderRadius: 99 }}>{estado}</span>
      </div>
      <div style={{ fontSize: 12, color: '#A89AAF', display: 'flex', gap: 8, alignItems: 'center' }}>
        {order.numero && <span style={{ fontFamily: 'monospace', fontWeight: 700, color: '#7A5F8A', background: '#F3EFF5', padding: '2px 8px', borderRadius: 6 }}>#{order.numero}</span>}
        <span>{dateStr} · {order.pago || 'Sin método'}</span>
      </div>
      <div style={{ background: '#FAF7FB', borderRadius: 10, padding: '10px 12px' }}>
        {(order.productos || []).map((p, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: '#1A1118', padding: '2px 0' }}>
            <span>{p.name}{p.personalization ? <span style={{ color: '#E8508A' }}> "{p.personalization}"</span> : null}</span>
            <span style={{ fontWeight: 700 }}>${p.price}</span>
          </div>
        ))}
        <div style={{ borderTop: '1px solid #EDE8EA', marginTop: 6, paddingTop: 6, display: 'flex', justifyContent: 'space-between', fontWeight: 800, fontSize: 14, color: '#1A1118' }}>
          <span>Total</span><span style={{ color: '#E8508A' }}>${order.total}</span>
        </div>
      </div>
      {order.notas && <div style={{ fontSize: 12, color: '#7A6880', fontStyle: 'italic' }}>📝 {order.notas}</div>}

      {/* ── Tracking ── */}

// ── Editable list (categorías / materiales) ─────────────────────────────────
function ListEditor({ title, hint, items, onChange, onRename, usageCount, emptyOk }) {
  const [draft, setDraft] = useState('');
  const [editIdx, setEditIdx] = useState(-1);
  const [editVal, setEditVal] = useState('');
  const [err, setErr] = useState('');

  const add = () => {
    const v = draft.trim();
    if (!v) return;
    if (items.some(i => i.toLowerCase() === v.toLowerCase())) { setErr('Ya existe "' + v + '"'); return; }
    onChange([...items, v]); setDraft(''); setErr('');
  };
  const remove = idx => {
    const item = items[idx];
    const used = usageCount ? usageCount(item) : 0;
    if (used > 0) { setErr('"' + item + '" se usa en ' + used + ' producto(s). Cámbialos primero.'); return; }
    if (!emptyOk && items.length <= 1) { setErr('Debe quedar al menos uno.'); return; }
    onChange(items.filter((_, i) => i !== idx)); setErr('');
  };
  const startEdit = idx => { setEditIdx(idx); setEditVal(items[idx]); setErr(''); };
  const commitEdit = () => {
    const v = editVal.trim();
    if (!v) { setEditIdx(-1); return; }
    const old = items[editIdx];
    if (v !== old && items.some(i => i.toLowerCase() === v.toLowerCase())) { setErr('Ya existe "' + v + '"'); return; }
    const next = items.map((it, i) => i === editIdx ? v : it);
    onChange(next);
    if (onRename && v !== old) onRename(old, v);
    setEditIdx(-1); setErr('');
  };

  const inp = { padding: '9px 12px', border: '1.5px solid #e4e4e4', borderRadius: 9, fontSize: 14, outline: 'none', flex: 1, boxSizing: 'border-box' };
  return (
    <div style={{ background: 'white', borderRadius: 16, padding: '20px 22px', boxShadow: '0 1px 6px rgba(0,0,0,.06)', marginBottom: 16 }}>
      <div style={{ fontWeight: 800, fontSize: 15, color: '#1A1118', marginBottom: 4 }}>{title}</div>
      {hint && <div style={{ fontSize: 12, color: '#A89AAF', marginBottom: 14 }}>{hint}</div>}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 }}>
        {items.map((it, idx) => (
          <div key={idx} style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#FAF7FB', borderRadius: 10, padding: '6px 8px 6px 12px' }}>
            {editIdx === idx ? (
              <input autoFocus value={editVal} onChange={e => setEditVal(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') commitEdit(); if (e.key === 'Escape') setEditIdx(-1); }}
                style={inp} />
            ) : (
              <span style={{ flex: 1, fontSize: 14, color: '#1A1118' }}>{it}{usageCount && <span style={{ color: '#A89AAF', fontSize: 12 }}> · {usageCount(it)}</span>}</span>
            )}
            {editIdx === idx ? (
              <button onClick={commitEdit} style={{ padding: '6px 12px', background: '#10B981', color: 'white', borderRadius: 8, fontSize: 12, fontWeight: 700, border: 'none', cursor: 'pointer' }}>✓</button>
            ) : (
              <button onClick={() => startEdit(idx)} style={{ padding: '6px 10px', background: 'white', color: '#7A6880', borderRadius: 8, fontSize: 13, border: '1px solid #EDE8EA', cursor: 'pointer' }} title="Renombrar">✏️</button>
            )}
            <button onClick={() => remove(idx)} style={{ padding: '6px 10px', background: '#FEE2E2', color: '#DC2626', borderRadius: 8, fontSize: 13, border: 'none', cursor: 'pointer' }} title="Eliminar">🗑</button>
          </div>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 8 }}>
        <input value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()}
          placeholder="Agregar nuevo…" style={inp} />
        <button onClick={add} style={{ padding: '9px 18px', background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', color: 'white', borderRadius: 9, fontWeight: 700, fontSize: 13, border: 'none', cursor: 'pointer', whiteSpace: 'nowrap' }}>+ Agregar</button>
      </div>
      {err && <div style={{ fontSize: 12, color: '#DC2626', fontWeight: 500, marginTop: 8 }}>{err}</div>}
    </div>
  );
}

// ── Gift Cards Tab ───────────────────────────────────────────────────────────
function GiftCardsTab({ token }) {
  const [cards, setCards]         = useState(null);
  const [loading, setLoading]     = useState(true);
  const [amount, setAmount]       = useState('25');
  const [note, setNote]           = useState('');
  const [creating, setCreating]   = useState(false);
  const [createMsg, setCreateMsg] = useState('');
  const [copied, setCopied]       = useState('');
  const [adjustAmt, setAdjustAmt] = useState({}); // {code: string}
  const [adjustMsg, setAdjustMsg] = useState({}); // {code: string}

  // Las gift cards viven en KV (worker), nunca en Firebase ni en el navegador.
  const load = async () => {
    setLoading(true);
    try {
      const data = await apiCall('giftcard/list', { token });
      setCards(Array.isArray(data.cards) ? data.cards : []);
    } catch(_) { setCards([]); }
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const create = async () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) { setCreateMsg('❌ Ingresa un monto válido.'); return; }
    setCreating(true); setCreateMsg('');
    try {
      const data = await apiCall('giftcard/create', { token, amount: amt, note: note.trim() });
      if (!data.card) throw new Error('write_failed');
      setCards(prev => [data.card, ...(prev||[])]);
      setCreateMsg(`✅ Creada: ${data.card.code}`);
      setNote('');
    } catch(_) { setCreateMsg('❌ Error al crear. Intenta de nuevo.'); }
    setCreating(false);
  };

  const deactivate = async code => {
    if (!confirm(`¿Desactivar la tarjeta ${code}?`)) return;
    try {
      await apiCall('giftcard/deactivate', { token, code });
      setCards(prev => prev.map(c => c.code===code ? {...c,active:false} : c));
    } catch(_) { alert('Error al desactivar'); }
  };

  const copyCode = code => {
    navigator.clipboard.writeText(code).catch(()=>{});
    setCopied(code);
    setTimeout(()=>setCopied(''),2000);
  };

  const adjust = async code => {
    const used = parseFloat(adjustAmt[code] || '');
    if (!used || used <= 0) { setAdjustMsg(m => ({...m, [code]: '❌ Monto inválido'})); return; }
    try {
      const data = await apiCall('giftcard/adjust', { token, code, usedAmount: used });
      if (!data.card) throw new Error();
      setCards(prev => prev.map(c => c.code === code ? data.card : c));
      setAdjustMsg(m => ({...m, [code]: `✅ Saldo: $${data.card.balance.toFixed(2)}`}));
      setAdjustAmt(a => ({...a, [code]: ''}));
    } catch(_) { setAdjustMsg(m => ({...m, [code]: '❌ Error al ajustar'})); }
  };

  const inp  = { padding:'10px 13px', border:'1.5px solid #e4e4e4', borderRadius:10, fontSize:14, outline:'none', background:'white' };
  const amounts = ['10','25','50','100'];

  return (
    <div style={{ maxWidth:640, margin:'0 auto', paddingBottom:40 }}>
      {/* Create form */}
      <div style={{ background:'white', borderRadius:16, padding:'20px 22px', marginBottom:20, boxShadow:'0 2px 12px rgba(0,0,0,.06)' }}>
        <div style={{ fontSize:13, fontWeight:700, color:'#7A6880', letterSpacing:'.1em', textTransform:'uppercase', marginBottom:14 }}>🎁 Nueva tarjeta de regalo</div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:12 }}>
          {amounts.map(a => (
            <button key={a} onClick={() => setAmount(a)}
              style={{ padding:'8px 18px', borderRadius:99, border:'1.5px solid', borderColor:amount===a?'#E85D8A':'#ddd', background:amount===a?'#FFF0F7':'white', color:amount===a?'#E85D8A':'#555', fontWeight:700, fontSize:14, cursor:'pointer' }}>
              ${a}
            </button>
          ))}
          <input value={amount} onChange={e=>setAmount(e.target.value)} type="number" min="1" step="1"
            placeholder="Otro monto" style={{ ...inp, width:120 }} />
        </div>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Nota (ej: Para María García — cumpleaños)"
          style={{ ...inp, width:'100%', boxSizing:'border-box', marginBottom:12 }} />
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <button onClick={create} disabled={creating}
            style={{ padding:'11px 28px', background:'linear-gradient(135deg,#E85D8A,#9B5DE5)', color:'white', border:'none', borderRadius:99, fontSize:14, fontWeight:700, cursor:'pointer', opacity:creating?.6:1 }}>
            {creating ? '⏳ Creando…' : '+ Crear tarjeta de regalo'}
          </button>
          {createMsg && <span style={{ fontSize:13, fontWeight:600, color:createMsg.startsWith('✅')?'#065F46':'#DC2626' }}>{createMsg}</span>}
        </div>
      </div>

      {/* Cards list */}
      <div style={{ background:'white', borderRadius:16, padding:'20px 22px', boxShadow:'0 2px 12px rgba(0,0,0,.06)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:700, color:'#7A6880', letterSpacing:'.1em', textTransform:'uppercase' }}>Tarjetas emitidas</div>
          <button onClick={load} style={{ fontSize:12, color:'#9B5DE5', fontWeight:600, cursor:'pointer', background:'none', border:'none' }}>↺ Recargar</button>
        </div>
        {loading && <div style={{ textAlign:'center', padding:'24px 0', color:'#aaa', fontSize:13 }}>Cargando…</div>}
        {!loading && (!cards || cards.length===0) && <div style={{ textAlign:'center', padding:'24px 0', color:'#aaa', fontSize:13 }}>No hay tarjetas emitidas aún</div>}
        {!loading && cards && cards.map(c => (
          <div key={c.code} style={{ display:'flex', gap:12, alignItems:'center', padding:'12px 0', borderBottom:'1px solid #f3f0f5', flexWrap:'wrap' }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                <code style={{ fontSize:13, fontWeight:700, color:'#333', letterSpacing:'.05em', background:'#F5F0FF', padding:'2px 8px', borderRadius:6 }}>{c.code}</code>
                <span style={{ fontSize:12, fontWeight:700, padding:'2px 9px', borderRadius:99, background:c.active&&c.balance>0?'#DCFCE7':'#F3F4F6', color:c.active&&c.balance>0?'#166534':'#6B7280' }}>
                  {c.active&&c.balance>0 ? `✓ $${(c.balance||0).toFixed(2)} disponible` : 'Agotada / inactiva'}
                </span>
              </div>
              <div style={{ fontSize:11, color:'#aaa', marginTop:4 }}>
                Valor original: ${(c.amount||0).toFixed(2)} · {c.createdAt||''}
                {c.note ? ` · ${c.note}` : ''}
              </div>
            </div>
            <div style={{ display:'flex', gap:6, flexShrink:0 }}>
              <button onClick={()=>copyCode(c.code)}
                style={{ padding:'6px 12px', borderRadius:8, border:'1.5px solid #e0e0e0', background:'white', fontSize:12, fontWeight:600, cursor:'pointer', color:copied===c.code?'#059669':'#555' }}>
                {copied===c.code ? '✓ Copiado' : '📋 Copiar'}
              </button>
              {c.active && (
                <button onClick={()=>deactivate(c.code)}
                  style={{ padding:'6px 12px', borderRadius:8, border:'1.5px solid #FFB3C1', background:'white', fontSize:12, fontWeight:600, cursor:'pointer', color:'#DC2626' }}>
                  Desactivar
                </button>
              )}
            </div>
            {c.active && c.balance > 0 && (
              <div style={{ width:'100%', display:'flex', alignItems:'center', gap:8, marginTop:6, flexWrap:'wrap' }}>
                <span style={{ fontSize:11, color:'#7A6880', fontWeight:600 }}>Registrar uso (después de confirmar pago):</span>
                <input type="number" min="0.01" step="0.01" placeholder="$0.00"
                  value={adjustAmt[c.code]||''}
                  onChange={e => setAdjustAmt(a => ({...a, [c.code]: e.target.value}))}
                  style={{ width:80, padding:'4px 8px', border:'1.5px solid #e0e0e0', borderRadius:6, fontSize:12, outline:'none' }} />
                <button onClick={()=>adjust(c.code)}
                  style={{ padding:'4px 14px', borderRadius:6, border:'1.5px solid #9B5DE5', background:'#F5F0FF', fontSize:12, fontWeight:700, cursor:'pointer', color:'#9B5DE5' }}>
                  Confirmar
                </button>
                {adjustMsg[c.code] && <span style={{ fontSize:11, fontWeight:600, color:adjustMsg[c.code].startsWith('✅')?'#065F46':'#DC2626' }}>{adjustMsg[c.code]}</span>}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Coupons Tab ─────────────────────────────────────────────────────────────
function CouponsTab({ token }) {
  const [coupons, setCoupons]   = useState(null);
  const [loading, setLoading]   = useState(true);
  const [form, setForm]         = useState({ code:'', type:'percent', amount:'10', maxUses:'', expiresAt:'', note:'' });
  const [creating, setCreating] = useState(false);
  const [createMsg, setCreateMsg] = useState('');
  const [useMsg, setUseMsg]     = useState({});

  const load = async () => {
    setLoading(true);
    try {
      const data = await apiCall('coupon/list', { token });
      setCoupons(Array.isArray(data.coupons) ? data.coupons : []);
    } catch(_) { setCoupons([]); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const create = async () => {
    if (!form.code.trim()) { setCreateMsg('❌ Ingresa un código.'); return; }
    const amount = parseFloat(form.amount);
    if (!amount || amount <= 0) { setCreateMsg('❌ Monto/porcentaje inválido.'); return; }
    if (form.type === 'percent' && amount > 100) { setCreateMsg('❌ Máximo 100%.'); return; }
    setCreating(true); setCreateMsg('');
    try {
      const data = await apiCall('coupon/create', {
        token,
        code: form.code.trim().toUpperCase().replace(/[^A-Z0-9_-]/g,''),
        type: form.type, amount,
        maxUses: form.maxUses ? parseInt(form.maxUses) : null,
        expiresAt: form.expiresAt || null,
        note: form.note.trim()
      });
      if (!data.coupon) throw new Error(data.error || 'Error');
      setCoupons(prev => [data.coupon, ...(prev || [])]);
      setCreateMsg(`✅ Creado: ${data.coupon.code}`);
      setForm({ code:'', type:'percent', amount:'10', maxUses:'', expiresAt:'', note:'' });
    } catch(e) { setCreateMsg('❌ ' + (e.message || 'Error al crear.')); }
    setCreating(false);
  };

  const deactivate = async code => {
    if (!confirm(`¿Desactivar el cupón ${code}?`)) return;
    try {
      await apiCall('coupon/deactivate', { token, code });
      setCoupons(prev => prev.map(c => c.code===code ? {...c,active:false} : c));
    } catch(_) { alert('Error al desactivar'); }
  };

  const deleteCoupon = async code => {
    if (!confirm(`¿Eliminar permanentemente el cupón ${code}? Esta acción no se puede deshacer.`)) return;
    try {
      await apiCall('coupon/delete', { token, code });
      setCoupons(prev => prev.filter(c => c.code !== code));
    } catch(_) { alert('Error al eliminar'); }
  };

  const registerUse = async code => {
    try {
      const data = await apiCall('coupon/use', { token, code });
      if (!data.coupon) throw new Error();
      setCoupons(prev => prev.map(c => c.code===code ? data.coupon : c));
      setUseMsg(m => ({...m, [code]:'✅ Uso registrado'}));
      setTimeout(() => setUseMsg(m => { const n={...m}; delete n[code]; return n; }), 3000);
    } catch(_) { setUseMsg(m => ({...m, [code]:'❌ Error'})); }
  };

  const inp = { padding:'10px 13px', border:'1.5px solid #e4e4e4', borderRadius:10, fontSize:14, outline:'none', background:'white' };
  const lbl = { fontSize:11, fontWeight:600, color:'#999', textTransform:'uppercase', letterSpacing:'.1em', marginBottom:5, display:'block' };

  return (
    <div style={{ maxWidth:640, margin:'0 auto', paddingBottom:40 }}>
      {/* Formulario de creación */}
      <div style={{ background:'white', borderRadius:16, padding:'20px 22px', marginBottom:20, boxShadow:'0 2px 12px rgba(0,0,0,.06)' }}>
        <div style={{ fontSize:13, fontWeight:700, color:'#7A6880', letterSpacing:'.1em', textTransform:'uppercase', marginBottom:14 }}>🏷️ Nuevo cupón de descuento</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:12 }}>
          <div>
            <label style={lbl}>Código</label>
            <input value={form.code} onChange={e=>setF('code',e.target.value.toUpperCase().replace(/[^A-Z0-9_-]/g,''))} placeholder="VERANO20"
              style={{ ...inp, width:'100%', boxSizing:'border-box', textTransform:'uppercase', letterSpacing:'.08em' }} />
          </div>
          <div>
            <label style={lbl}>Tipo</label>
            <select value={form.type} onChange={e=>setF('type',e.target.value)} style={{ ...inp, width:'100%', boxSizing:'border-box' }}>
              <option value="percent">% Porcentaje</option>
              <option value="fixed">$ Monto fijo</option>
            </select>
          </div>
          <div>
            <label style={lbl}>{form.type==='percent'?'Porcentaje (1-100)':'Monto ($)'}</label>
            <input type="number" min="1" step={form.type==='percent'?'1':'0.01'} value={form.amount} onChange={e=>setF('amount',e.target.value)}
              style={{ ...inp, width:'100%', boxSizing:'border-box' }} />
          </div>
          <div>
            <label style={lbl}>Usos máximos</label>
            <input type="number" min="1" step="1" value={form.maxUses} onChange={e=>setF('maxUses',e.target.value)} placeholder="Ilimitado"
              style={{ ...inp, width:'100%', boxSizing:'border-box' }} />
          </div>
          <div>
            <label style={lbl}>Vence el</label>
            <input type="date" value={form.expiresAt} onChange={e=>setF('expiresAt',e.target.value)} style={{ ...inp, width:'100%', boxSizing:'border-box' }} />
          </div>
          <div>
            <label style={lbl}>Nota interna</label>
            <input value={form.note} onChange={e=>setF('note',e.target.value)} placeholder="Campaña verano…" style={{ ...inp, width:'100%', boxSizing:'border-box' }} />
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <button onClick={create} disabled={creating}
            style={{ padding:'11px 28px', background:'linear-gradient(135deg,#E85D8A,#9B5DE5)', color:'white', border:'none', borderRadius:99, fontSize:14, fontWeight:700, cursor:'pointer', opacity:creating?.6:1 }}>
            {creating ? '⏳ Creando…' : '+ Crear cupón'}
          </button>
          {createMsg && <span style={{ fontSize:13, fontWeight:600, color:createMsg.startsWith('✅')?'#065F46':'#DC2626' }}>{createMsg}</span>}
        </div>
      </div>

      {/* Lista de cupones */}
      <div style={{ background:'white', borderRadius:16, padding:'20px 22px', boxShadow:'0 2px 12px rgba(0,0,0,.06)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:700, color:'#7A6880', letterSpacing:'.1em', textTransform:'uppercase' }}>Cupones creados</div>
          <button onClick={load} style={{ fontSize:12, color:'#9B5DE5', fontWeight:600, cursor:'pointer', background:'none', border:'none' }}>↺ Recargar</button>
        </div>
        {loading && <div style={{ textAlign:'center', padding:'24px 0', color:'#aaa', fontSize:13 }}>Cargando…</div>}
        {!loading && (!coupons || coupons.length===0) && <div style={{ textAlign:'center', padding:'24px 0', color:'#aaa', fontSize:13 }}>No hay cupones creados aún</div>}
        {!loading && coupons && coupons.map(c => {
          const expired    = c.expiresAt && new Date(c.expiresAt + 'T23:59:59') < new Date();
          const exhausted  = c.maxUses != null && c.usedCount >= c.maxUses;
          const statusOk   = c.active && !expired && !exhausted;
          return (
            <div key={c.code} style={{ padding:'12px 0', borderBottom:'1px solid #f3f0f5' }}>
              <div style={{ display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
                <code style={{ fontSize:13, fontWeight:700, color:'#333', letterSpacing:'.05em', background:'#F5F0FF', padding:'2px 8px', borderRadius:6 }}>{c.code}</code>
                <span style={{ fontSize:12, fontWeight:700, padding:'2px 9px', borderRadius:99,
                  background:statusOk?'#DCFCE7':'#F3F4F6', color:statusOk?'#166534':'#6B7280' }}>
                  {statusOk ? '✓ Activo' : expired ? 'Vencido' : exhausted ? 'Agotado' : 'Inactivo'}
                </span>
                <span style={{ fontSize:13, color:'#333', fontWeight:700 }}>
                  {c.type==='percent' ? `${c.amount}% OFF` : `$${(c.amount||0).toFixed(2)} OFF`}
                </span>
                <span style={{ fontSize:11, color:'#aaa' }}>
                  Usos: {c.usedCount||0}{c.maxUses!=null?`/${c.maxUses}`:''}
                  {c.expiresAt ? ` · Vence: ${c.expiresAt}` : ''}
                  {c.note ? ` · ${c.note}` : ''}
                </span>
              </div>
              <div style={{ display:'flex', gap:6, marginTop:8, flexWrap:'wrap', alignItems:'center' }}>
                {statusOk && (
                  <button onClick={()=>registerUse(c.code)}
                    style={{ padding:'5px 12px', borderRadius:8, border:'1.5px solid #9B5DE5', background:'#F5F0FF', fontSize:12, fontWeight:700, cursor:'pointer', color:'#9B5DE5' }}>
                    +1 Uso (confirmar pago)
                  </button>
                )}
                {useMsg[c.code] && <span style={{ fontSize:11, fontWeight:600, color:useMsg[c.code].startsWith('✅')?'#065F46':'#DC2626' }}>{useMsg[c.code]}</span>}
                {c.active && (
                  <button onClick={()=>deactivate(c.code)}
                    style={{ padding:'5px 12px', borderRadius:8, border:'1.5px solid #FFB3C1', background:'white', fontSize:12, fontWeight:600, cursor:'pointer', color:'#DC2626' }}>
                    Desactivar
                  </button>
                )}
                <button onClick={()=>deleteCoupon(c.code)}
                  style={{ padding:'5px 12px', borderRadius:8, border:'1.5px solid #eee', background:'white', fontSize:12, fontWeight:600, cursor:'pointer', color:'#999' }}>
                  Eliminar
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
