// ── Utils ──────────────────────────────────────────────────────────────────
const sha256 = async str => {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
};
function strToB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i += 8192) bin += String.fromCharCode(...bytes.subarray(i, i + 8192));
  return btoa(bin);
}
function b64ToStr(b64) {
  const bin = atob(b64.replace(/\n/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

// ── Backend API (Cloudflare Worker) ──────────────────────────────────────────
async function apiCall(endpoint, payload) {
  const r = await fetch(`${ADMIN_API}/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload || {})
  });
  let data = {};
  try { data = await r.json(); } catch (_) {}
  if (!r.ok) { const e = new Error(data.error || `Error ${r.status}`); e.status = r.status; throw e; }
  return data;
}
// Inicia sesión → devuelve un token de sesión temporal (no credenciales)
const apiLogin  = (user, pass)            => apiCall('login', { user, pass });

// Sube una imagen (base64) vía backend

// Traduce texto de español a inglés vía MyMemory (gratis, sin API key)
async function translateToEn(text) {
  if (!text || !text.trim()) return '';
  try {
    const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text.trim()) + '&langpair=es|en');
    const data = await res.json();
    return data?.responseData?.translatedText || text;
  } catch (_) { return text; }
}
// Guarda suscripción push en el backend
const apiSubscribe = (token, subscription) => apiCall('subscribe', { token, subscription });

// ── Push Notifications ─────────────────────────────────────────────────────
function vapidKeyToUint8Array(b64url) {
  const padding = '='.repeat((4 - b64url.length % 4) % 4);
  const base64  = (b64url + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

async function setupPush(token, onStateChange) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    onStateChange('unsupported'); return;
  }
  try {
    const reg  = await navigator.serviceWorker.register('/ui_kits/admin/sw.js', { scope: '/ui_kits/admin/' });
    await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { onStateChange('denied'); return; }
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly:      true,
        applicationServerKey: vapidKeyToUint8Array(VAPID_PUB_KEY)
      });
    }
    await apiSubscribe(token, sub.toJSON());
    onStateChange('subscribed');
  } catch (e) {
    console.error('Push setup error:', e);
    onStateChange('error');
  }
}

function compressImage(file, maxPx = 900) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > maxPx || h > maxPx) {
        if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else        { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      cv.toBlob(blob => {
        const fr = new FileReader();
        fr.onload = e => resolve(e.target.result.split(',')[1]);
        fr.readAsDataURL(blob);
      }, 'image/jpeg', 0.88);
    };
    img.src = url;
  });
}

// ── Image Editor (drag to pan + +/- zoom) ──────────────────────────────────
function ImageEditor({ imgSrc, focalX, focalY, zoom, onChange }) {
  const ref  = React.useRef(null);
  const drag = React.useRef(null);
  const fx = focalX ?? 50, fy = focalY ?? 50, z = zoom ?? 1;

  const startDrag = (cx, cy) => { drag.current = { cx, cy, fx, fy }; };
  const moveDrag  = (cx, cy) => {
    if (!drag.current || !ref.current) return;
    const w = ref.current.offsetWidth, h = ref.current.offsetHeight;
    onChange({
      focalX: Math.max(0, Math.min(100, drag.current.fx - ((cx - drag.current.cx) / w) * 100)),
      focalY: Math.max(0, Math.min(100, drag.current.fy - ((cy - drag.current.cy) / h) * 100))
    });
  };
  const endDrag = () => { drag.current = null; };

  const btnStyle = { width: 40, height: 40, borderRadius: 10, border: '1.5px solid #e0e0e0', background: 'white', fontSize: 22, fontWeight: 700, color: '#555', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, userSelect: 'none' };

  return (
    <div>
      <div ref={ref}
        style={{ width: '100%', height: 220, overflow: 'hidden', borderRadius: 12, cursor: drag.current ? 'grabbing' : 'grab', touchAction: 'none', userSelect: 'none', position: 'relative', background: '#eee' }}
        onMouseDown={e => { startDrag(e.clientX, e.clientY); e.preventDefault(); }}
        onMouseMove={e => moveDrag(e.clientX, e.clientY)}
        onMouseUp={endDrag} onMouseLeave={endDrag}
        onTouchStart={e => { startDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }}
        onTouchMove={e => { moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }}
        onTouchEnd={endDrag}
      >
        <img src={imgSrc} draggable={false}
          style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: `${fx}% ${fy}%`, transform: `scale(${z})`, transformOrigin: `${fx}% ${fy}%`, pointerEvents: 'none', display: 'block' }}
        />
        <div style={{ position: 'absolute', top: 8, right: 8, background: 'rgba(0,0,0,.45)', color: 'white', fontSize: 11, borderRadius: 6, padding: '3px 8px', fontFamily: 'sans-serif', fontWeight: 600 }}>
          {Math.round(z * 100)}%
        </div>
        <div style={{ position: 'absolute', bottom: 8, left: 0, right: 0, textAlign: 'center', color: 'rgba(255,255,255,.8)', fontSize: 10, fontFamily: 'sans-serif', pointerEvents: 'none' }}>
          ✥ Arrastra para mover
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 10 }}>
        <button style={btnStyle} onClick={() => onChange({ zoom: Math.max(0.5, parseFloat((z - 0.15).toFixed(2))) })}>−</button>
        <div style={{ flex: 1, textAlign: 'center', fontSize: 12, color: '#888' }}>🔍 Zoom</div>
        <button style={btnStyle} onClick={() => onChange({ zoom: Math.min(3, parseFloat((z + 0.15).toFixed(2))) })}>+</button>
      </div>
    </div>
  );
}

// ── Product Modal ──────────────────────────────────────────────────────────
function ProductModal({ product, onSave, onClose, token, categories, materials, fbSurcharges = {}, fbMarkets = {} }) {
  const cats = (categories && categories.length) ? categories : DEFAULT_CATEGORIES;
  const mats = (materials && materials.length) ? materials : DEFAULT_MATERIALS;
  const isNew = !product?.id;
  const initMkt = product ? (fbMarkets[product.id] || 'both') : 'both';
  const blank = { name: '', category: cats[0], price: '', oldPrice: '', img: 'collar', color: 'rose', tag: '', description: '', personalized: false, available: true, imageUrl: '', focalX: 50, focalY: 50, zoom: 1, material: mats[0], surcharge: false, marketEC: true, marketUS: true, promoEnabled: false, promoPrice: '', promoLabel: 'Oferta', promoEndsAt: '' };
  const [form, setForm] = useState(product
    ? { ...product, tag: product.tag || '', oldPrice: product.oldPrice || '', surcharge: !!fbSurcharges[product.id], marketEC: initMkt !== 'us', marketUS: initMkt !== 'ec', promoEnabled: !!(product.promo && product.promo.price), promoPrice: (product.promo && product.promo.price) || '', promoLabel: (product.promo && product.promo.label) || 'Oferta', promoEndsAt: (product.promo && product.promo.endsAt) || '' }
    : blank);
  const [imgPrev, setImgPrev] = useState(product?.imageUrl || '');
  const [uploading, setUploading] = useState(false);
  const [uploadMsg, setUploadMsg] = useState('');
  const [dragOver, setDragOver] = useState(false);
  const [translating, setTranslating] = useState(false);
  const fileRef = useRef();
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const uploadFile = async file => {
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      setUploadMsg('❌ Ese archivo no es una imagen. Usa JPG, PNG o WebP.');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      setUploadMsg('❌ La imagen es muy pesada (máx 10MB). Toma otra foto.');
      return;
    }
    setUploading(true); setUploadMsg('');
    try {
      setImgPrev(URL.createObjectURL(file));
      const b64 = await compressImage(file);
      const slug = file.name.replace(/[^a-z0-9]+/gi, '_').toLowerCase().substring(0, 40) || 'foto';
      const fname = `${Date.now()}_${slug}.jpg`;
      const path = `${IMAGES_PATH}/${fname}`;
      const res = await apiUpload(token, path, b64, `Imagen: ${fname}`);
      set('imageUrl', res.url);
      setUploadMsg('✅ Foto subida correctamente');
    } catch (e) {
      setUploadMsg(e.status === 401 ? '⚠️ Sesión expirada. Cierra sesión y vuelve a entrar.' : '❌ Error al subir: ' + e.message);
      setImgPrev(form.imageUrl || '');
    } finally { setUploading(false); }
  };

  const handleFile = e => uploadFile(e.target.files[0]);
  const handleDrop = e => {
    e.preventDefault(); setDragOver(false);
    uploadFile(e.dataTransfer.files[0]);
  };

  const save = async () => {
    if (!form.name.trim() || !form.price) return;
    setTranslating(true);
    let name_en = form.name_en || '';
    let description_en = form.description_en || '';
    try {
      [name_en, description_en] = await Promise.all([
        translateToEn(form.name),
        translateToEn(form.description || '')
      ]);
    } catch (_) {}
    setTranslating(false);
    const market = (form.marketEC && form.marketUS) || (!form.marketEC && !form.marketUS) ? 'both' : form.marketEC ? 'ec' : 'us';
    const promo = form.promoEnabled && form.promoPrice
      ? { price: Number(form.promoPrice), label: form.promoLabel || 'Oferta', endsAt: form.promoEndsAt || null }
      : null;
    onSave({
      ...form,
      name_en,
      description_en,
      id: form.id || Date.now(),
      price: Number(form.price),
      oldPrice: form.oldPrice ? Number(form.oldPrice) : null,
      tag: form.tag || null,
      available: form.available !== false,
      surcharge: !!form.surcharge,
      market,
      promo
    });
  };

  const inp = { padding: '10px 13px', border: '1.5px solid #e4e4e4', borderRadius: 10, fontSize: 14, outline: 'none', width: '100%', boxSizing: 'border-box', background: 'white' };
  const lbl = { display: 'block', fontSize: 11, fontWeight: 600, color: '#777', letterSpacing: '.11em', textTransform: 'uppercase', marginBottom: 5 };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(26,17,36,.65)', zIndex: 1000, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '20px 16px', overflowY: 'auto' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: 'white', borderRadius: 24, padding: '32px 28px', width: '100%', maxWidth: 540, boxShadow: '0 24px 80px rgba(0,0,0,.35)', marginTop: 20, animation: 'fadeIn .3s ease' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: '#1a1a1a' }}>{isNew ? '➕ Nuevo Producto' : '✏️ Editar Producto'}</h2>
          <button onClick={onClose} style={{ width: 34, height: 34, borderRadius: '50%', background: '#f0f0f0', color: '#666', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', border: 'none', cursor: 'pointer' }}>✕</button>
        </div>

        {/* Image upload */}
        <div style={{ marginBottom: 20 }}>
          <label style={lbl}>Foto del Producto</label>
          <div onClick={() => !uploading && fileRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={e => { e.preventDefault(); setDragOver(false); }}
            onDrop={handleDrop}
            style={{ height: 160, borderRadius: 14, border: dragOver ? '2px dashed #9B5DE5' : '2px dashed #e0e0e0', cursor: uploading ? 'wait' : 'pointer', overflow: 'hidden', background: dragOver ? '#F6F0FE' : '#fafafa', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', transition: 'border-color .2s, background .2s' }}>
            {imgPrev
              ? <img src={imgPrev} style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: `${form.focalX ?? 50}% ${form.focalY ?? 50}%`, transform: `scale(${form.zoom ?? 1})`, transformOrigin: `${form.focalX ?? 50}% ${form.focalY ?? 50}%` }} alt="preview" />
              : <div style={{ textAlign: 'center', color: dragOver ? '#9B5DE5' : '#bbb', pointerEvents: 'none' }}>
                  <div style={{ fontSize: 40, marginBottom: 6 }}>{dragOver ? '⬇️' : '📸'}</div>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{dragOver ? 'Suelta la foto aquí' : 'Toca para elegir una foto'}</div>
                  <div style={{ fontSize: 12, marginTop: 3 }}>o arrástrala aquí · JPG · PNG · WebP</div>
                </div>}
            {imgPrev && !uploading &&
              <button onClick={e => { e.stopPropagation(); setImgPrev(''); set('imageUrl', ''); setUploadMsg(''); }}
                style={{ position: 'absolute', top: 8, right: 8, width: 30, height: 30, borderRadius: '50%', background: 'rgba(26,17,36,.7)', color: 'white', fontSize: 15, display: 'flex', alignItems: 'center', justifyContent: 'center', border: 'none', cursor: 'pointer' }}
                title="Quitar foto">✕</button>}
            {uploading && <div style={{ position: 'absolute', inset: 0, background: 'rgba(255,255,255,.88)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, color: '#9B5DE5', fontWeight: 600 }}>⏳ Subiendo foto…</div>}
          </div>
          <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display: 'none' }} />
          {uploadMsg && <div style={{ fontSize: 12, marginTop: 6, color: uploadMsg.startsWith('✅') ? '#065F46' : '#DC2626', fontWeight: 500 }}>{uploadMsg}</div>}
          {!uploadMsg && <div style={{ fontSize: 11, color: '#aaa', marginTop: 6 }}>💡 La foto se optimiza automáticamente para cargar rápido en la tienda.</div>}
          {imgPrev && !uploading && (
            <div style={{ marginTop: 10, background: '#FAF7FB', borderRadius: 10, padding: '10px 14px' }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#7A6880', marginBottom: 8 }}>🎯 Ajustar posición y zoom</div>
              <ImageEditor
                imgSrc={imgPrev}
                focalX={form.focalX} focalY={form.focalY} zoom={form.zoom}
                onChange={vals => setForm(f => ({ ...f, ...vals }))}
              />
            </div>
          )}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          <div style={{ gridColumn: 'span 2' }}>
            <label style={lbl}>Nombre del producto *</label>
            <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="Ej: Collar con nombre personalizado" style={inp} />
          </div>
          <div>
            <label style={lbl}>Categoría</label>
            <select value={form.category} onChange={e => set('category', e.target.value)} style={inp}>
              {(cats.includes(form.category) ? cats : [form.category, ...cats]).map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Material</label>
            <select value={form.material || mats[0]} onChange={e => set('material', e.target.value)} style={inp}>
              {mats.map(m => <option key={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Etiqueta</label>
            <select value={form.tag || ''} onChange={e => set('tag', e.target.value || null)} style={inp}>
              <option value="">Sin etiqueta</option>
              <option>Bestseller</option>
              <option>Nuevo</option>
            </select>
          </div>
          <div>
            <label style={lbl}>Precio USD *</label>
            <input type="number" min="0" step="0.01" value={form.price} onChange={e => set('price', e.target.value)} placeholder="45" style={inp} />
          </div>
          <div>
            <label style={lbl}>Precio anterior (tachado)</label>
            <input type="number" min="0" step="0.01" value={form.oldPrice || ''} onChange={e => set('oldPrice', e.target.value)} placeholder="60" style={inp} />
          </div>
          <div style={{ gridColumn: 'span 2' }}>
            <label style={lbl}>Descripción</label>
            <textarea value={form.description || ''} onChange={e => set('description', e.target.value)} rows={3}
              placeholder="Describe el material, medidas y detalles especiales…" style={{ ...inp, resize: 'vertical' }} />
          </div>
        </div>

        {/* Fallback appearance — only used when there is no photo */}
        <details style={{ marginTop: 16, background: '#FAF7FB', borderRadius: 12, padding: '10px 14px' }}>
          <summary style={{ cursor: 'pointer', fontSize: 12, fontWeight: 600, color: '#7A6880', listStyle: 'none' }}>
            🎨 Apariencia sin foto (opcional) — solo si no subes una foto
          </summary>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginTop: 12 }}>
            <div>
              <label style={lbl}>Ícono de respaldo</label>
              <select value={form.img} onChange={e => set('img', e.target.value)} style={inp}>
                {IMG_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={lbl}>Color de respaldo</label>
              <select value={form.color} onChange={e => set('color', e.target.value)} style={inp}>
                {Object.keys(COLORS).map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
        </details>

        <div style={{ display: 'flex', gap: 24, margin: '18px 0 16px' }}>
          {[['personalized', '✦ Personalizable'], ['available', '✅ Disponible en tienda']].map(([k, label]) => (
            <label key={k} style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13, color: '#555', fontWeight: 500 }}>
              <input type="checkbox" checked={!!form[k] && form[k] !== false} onChange={e => set(k, e.target.checked)}
                style={{ width: 16, height: 16, cursor: 'pointer', accentColor: '#9B5DE5' }} />
              {label}
            </label>
          ))}
        </div>

        <div style={{ background: '#FAF7FB', borderRadius: 12, padding: '14px 16px', marginBottom: 24 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#7A6880', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: 12 }}>Mercado y recargo</div>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13, color: '#555', fontWeight: 500, marginBottom: 12 }}>
            <input type="checkbox" checked={!!form.surcharge} onChange={e => set('surcharge', e.target.checked)}
              style={{ width: 16, height: 16, cursor: 'pointer', accentColor: '#E85D8A' }} />
            💳 Recargo del 4% al pagar con tarjeta (Square)
            {form.surcharge && form.price
              ? <span style={{ marginLeft: 'auto', fontSize: 11, color: '#E85D8A', fontWeight: 700, whiteSpace: 'nowrap' }}>→ ${(Number(form.price) * 1.04).toFixed(2)} con recargo</span>
              : null}
          </label>
          <div style={{ fontSize: 12, color: '#7A6880', fontWeight: 600, marginBottom: 8 }}>Disponible en:</div>
          <div style={{ display: 'flex', gap: 24 }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13, color: '#555', fontWeight: 500 }}>
              <input type="checkbox" checked={!!form.marketEC} onChange={e => set('marketEC', e.target.checked)}
                style={{ width: 16, height: 16, cursor: 'pointer', accentColor: '#27AE60' }} />
              🇪🇨 Ecuador
            </label>
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13, color: '#555', fontWeight: 500 }}>
              <input type="checkbox" checked={!!form.marketUS} onChange={e => set('marketUS', e.target.checked)}
                style={{ width: 16, height: 16, cursor: 'pointer', accentColor: '#2980B9' }} />
              🇺🇸 Estados Unidos
            </label>
          </div>
        </div>

        {/* En oferta / Promoción */}
        <div style={{ background: '#FFF8F0', borderRadius: 12, padding: '14px 16px', marginBottom: 24, border: '1px solid #FFE0B2' }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13, color: '#555', fontWeight: 600, marginBottom: form.promoEnabled ? 14 : 0 }}>
            <input type="checkbox" checked={!!form.promoEnabled} onChange={e => set('promoEnabled', e.target.checked)}
              style={{ width: 16, height: 16, cursor: 'pointer', accentColor: '#FF6B00' }} />
            🏷️ Poner en oferta / promoción
          </label>
          {form.promoEnabled && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <label style={lbl}>Precio de oferta USD *</label>
                <input type="number" min="0" step="0.01" value={form.promoPrice || ''} onChange={e => set('promoPrice', e.target.value)}
                  placeholder="35.00" style={inp} />
              </div>
              <div>
                <label style={lbl}>Etiqueta de oferta</label>
                <input value={form.promoLabel || ''} onChange={e => set('promoLabel', e.target.value)}
                  placeholder="Flash · Promo · 2x1" style={inp} />
              </div>
              <div style={{ gridColumn: 'span 2' }}>
                <label style={lbl}>Válido hasta (opcional)</label>
                <input type="date" value={form.promoEndsAt || ''} onChange={e => set('promoEndsAt', e.target.value)} style={inp} />
              </div>
              {form.price && form.promoPrice && Number(form.promoPrice) < Number(form.price) && (
                <div style={{ gridColumn: 'span 2', fontSize: 12, color: '#FF6B00', fontWeight: 600 }}>
                  💰 Descuento: ${(Number(form.price) - Number(form.promoPrice)).toFixed(2)} ({Math.round((1 - Number(form.promoPrice) / Number(form.price)) * 100)}% off)
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, padding: 13, border: '1.5px solid #ddd', borderRadius: 99, color: '#666', fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>Cancelar</button>
          <button onClick={save} disabled={!form.name || !form.price || translating}
            style={{ flex: 2, padding: 13, background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', color: 'white', borderRadius: 99, fontSize: 14, fontWeight: 700, boxShadow: '0 4px 16px rgba(155,93,229,.35)', opacity: (!form.name || !form.price || translating) ? .5 : 1, cursor: translating ? 'wait' : 'pointer', border: 'none' }}>
            {translating ? '🌐 Traduciendo al inglés…' : (isNew ? '+ Agregar Producto' : '💾 Guardar Cambios')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Order Card ─────────────────────────────────────────────────────────────
function OrderCard({ order, onStatusChange, onDelete }) {
  const dateStr = new Date(order.fecha).toLocaleDateString('es-EC', { day: '2-digit', month: 'short', year: 'numeric' });
  const estado = order.estado || 'Nuevo';
  const nextIdx = Math.min(ORDER_STATES.indexOf(estado) + 1, ORDER_STATES.length - 2);
  const nextState = ORDER_STATES[nextIdx];
  const waNum = ((order.cliente && order.cliente.telefono) || '').replace(/[^0-9]/g, '');
  return (
    <div style={{ background: 'white', borderRadius: 16, padding: 18, boxShadow: '0 2px 12px rgba(0,0,0,0.07)', border: '1px solid #f0ecf0', display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 15, color: '#1A1118' }}>{(order.cliente && order.cliente.nombre) || 'Cliente'}</div>
          <div style={{ fontSize: 12, color: '#7A6880', marginTop: 2 }}>{order.cliente && order.cliente.telefono} · {order.cliente && order.cliente.ciudad}</div>
        </div>
        <span style={{ background: STATE_COLORS[estado] || '#E8508A', color: 'white', fontSize: 11, fontWeight: 700, padding: '4px 10px', borderRadius: 99 }}>{estado}</span>
      </div>
      <div style={{ fontSize: 12, color: '#A89AAF' }}>{dateStr} · {order.pago || 'Sin método'}</div>
      <div style={{ background: '#FAF7FB', borderRadius: 10, padding: '10px 12px' }}>
        {(order.productos || []).map((p, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: '#1A1118', padding: '2px 0' }}>
            <span>{p.name}{p.personalization ? <span style={{ color: '#E8508A' }}> "{p.personalization}"</span> : null}</span>
            <span style={{ fontWeight: 700 }}>${p.price}</span>
          </div>
        ))}
        <div style={{ borderTop: '1px solid #EDE8EA', marginTop: 6, paddingTop: 6, display: 'flex', justifyContent: 'space-between', fontWeight: 800, fontSize: 14, color: '#1A1118' }}>
          <span>Total</span><span style={{ color: '#E8508A' }}>${order.total}</span>
        </div>
      </div>
      {order.notas && <div style={{ fontSize: 12, color: '#7A6880', fontStyle: 'italic' }}>📝 {order.notas}</div>}
      <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
        {estado !== 'Entregado' && estado !== 'Cancelado' && (
          <button onClick={() => onStatusChange(order, nextState)}
            style={{ flex: 1, padding: '8px', background: STATE_COLORS[nextState] || '#E8508A', color: 'white', borderRadius: 99, fontSize: 12, fontWeight: 700, border: 'none', cursor: 'pointer' }}>
            → {nextState}
          </button>
        )}
        <button onClick={() => onStatusChange(order, 'Cancelado')}
          style={{ padding: '8px 12px', background: '#FEE2E2', color: '#DC2626', borderRadius: 99, fontSize: 12, fontWeight: 700, border: 'none', cursor: 'pointer' }} title="Cancelar">✕</button>
        {waNum && <a href={'https://wa.me/' + waNum} target="_blank" rel="noopener noreferrer"
          style={{ padding: '8px 12px', background: '#DCF8C6', color: '#128C7E', borderRadius: 99, fontSize: 12, fontWeight: 700, textDecoration: 'none', display: 'flex', alignItems: 'center' }}>💬</a>}
        <button onClick={() => onDelete(order)}
          style={{ padding: '8px 12px', background: '#F9F5F7', color: '#A89AAF', borderRadius: 99, fontSize: 12, border: 'none', cursor: 'pointer' }} title="Eliminar">🗑</button>
      </div>
    </div>
  );
}

// ── New Order Modal ────────────────────────────────────────────────────────
function NewOrderModal({ open, onClose, onSave }) {
  const [form, setForm] = useState({ nombre: '', telefono: '', ciudad: '', pago: 'Transferencia bancaria', notas: '', prodNombre: '', prodPersonal: '', prodPrecio: '' });
  if (!open) return null;
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const inp = { border: '1.5px solid #e0e0e0', borderRadius: 10, padding: '9px 13px', fontSize: 13, width: '100%', outline: 'none', fontFamily: 'inherit', boxSizing: 'border-box' };
  const submit = e => {
    e.preventDefault();
    const order = {
      id: Date.now(), fecha: new Date().toISOString(),
      cliente: { nombre: form.nombre, telefono: form.telefono, ciudad: form.ciudad },

// ── Editable list (categorías / materiales) ─────────────────────────────────
function ListEditor({ title, hint, items, onChange, onRename, usageCount, emptyOk }) {
  const [draft, setDraft] = useState('');
  const [editIdx, setEditIdx] = useState(-1);
  const [editVal, setEditVal] = useState('');
  const [err, setErr] = useState('');

  const add = () => {
    const v = draft.trim();
    if (!v) return;
    if (items.some(i => i.toLowerCase() === v.toLowerCase())) { setErr('Ya existe "' + v + '"'); return; }
    onChange([...items, v]); setDraft(''); setErr('');
  };
  const remove = idx => {
    const item = items[idx];
    const used = usageCount ? usageCount(item) : 0;
    if (used > 0) { setErr('"' + item + '" se usa en ' + used + ' producto(s). Cámbialos primero.'); return; }
    if (!emptyOk && items.length <= 1) { setErr('Debe quedar al menos uno.'); return; }
    onChange(items.filter((_, i) => i !== idx)); setErr('');
  };
  const startEdit = idx => { setEditIdx(idx); setEditVal(items[idx]); setErr(''); };
  const commitEdit = () => {
    const v = editVal.trim();
    if (!v) { setEditIdx(-1); return; }
    const old = items[editIdx];
    if (v !== old && items.some(i => i.toLowerCase() === v.toLowerCase())) { setErr('Ya existe "' + v + '"'); return; }
    const next = items.map((it, i) => i === editIdx ? v : it);
    onChange(next);
    if (onRename && v !== old) onRename(old, v);
    setEditIdx(-1); setErr('');
  };

  const inp = { padding: '9px 12px', border: '1.5px solid #e4e4e4', borderRadius: 9, fontSize: 14, outline: 'none', flex: 1, boxSizing: 'border-box' };
  return (
    <div style={{ background: 'white', borderRadius: 16, padding: '20px 22px', boxShadow: '0 1px 6px rgba(0,0,0,.06)', marginBottom: 16 }}>
      <div style={{ fontWeight: 800, fontSize: 15, color: '#1A1118', marginBottom: 4 }}>{title}</div>
      {hint && <div style={{ fontSize: 12, color: '#A89AAF', marginBottom: 14 }}>{hint}</div>}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 }}>
        {items.map((it, idx) => (
          <div key={idx} style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#FAF7FB', borderRadius: 10, padding: '6px 8px 6px 12px' }}>
            {editIdx === idx ? (
              <input autoFocus value={editVal} onChange={e => setEditVal(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') commitEdit(); if (e.key === 'Escape') setEditIdx(-1); }}
                style={inp} />
            ) : (
              <span style={{ flex: 1, fontSize: 14, color: '#1A1118' }}>{it}{usageCount && <span style={{ color: '#A89AAF', fontSize: 12 }}> · {usageCount(it)}</span>}</span>
            )}
            {editIdx === idx ? (
              <button onClick={commitEdit} style={{ padding: '6px 12px', background: '#10B981', color: 'white', borderRadius: 8, fontSize: 12, fontWeight: 700, border: 'none', cursor: 'pointer' }}>✓</button>
            ) : (
              <button onClick={() => startEdit(idx)} style={{ padding: '6px 10px', background: 'white', color: '#7A6880', borderRadius: 8, fontSize: 13, border: '1px solid #EDE8EA', cursor: 'pointer' }} title="Renombrar">✏️</button>
            )}
            <button onClick={() => remove(idx)} style={{ padding: '6px 10px', background: '#FEE2E2', color: '#DC2626', borderRadius: 8, fontSize: 13, border: 'none', cursor: 'pointer' }} title="Eliminar">🗑</button>
          </div>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 8 }}>
        <input value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()}
          placeholder="Agregar nuevo…" style={inp} />
        <button onClick={add} style={{ padding: '9px 18px', background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', color: 'white', borderRadius: 9, fontWeight: 700, fontSize: 13, border: 'none', cursor: 'pointer', whiteSpace: 'nowrap' }}>+ Agregar</button>
      </div>
      {err && <div style={{ fontSize: 12, color: '#DC2626', fontWeight: 500, marginTop: 8 }}>{err}</div>}
    </div>
  );
}

// ── Descuentos Tab ──────────────────────────────────────────────────────────
function ComboForm({ combo, products, onSave, onClose }) {
  const [form, setForm] = useState(combo
    ? { ...combo }
    : { id: null, name: '', items: [], price: '', imageUrl: '', available: true });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const toggleItem = id => setForm(f => {
    const items = f.items.includes(id) ? f.items.filter(x => x !== id) : [...f.items, id];
    return { ...f, items };
  });
  const save = () => {
    if (!form.name.trim() || !form.price || form.items.length < 2) return;
    onSave({ ...form, id: form.id || Date.now(), price: Number(form.price), available: form.available !== false });
  };
  const origTotal = form.items.reduce((s, id) => {
    const p = products.find(x => x.id === id);
    return s + (p ? Number(p.price) : 0);
  }, 0);
  const inp = { padding: '10px 13px', border: '1.5px solid #e4e4e4', borderRadius: 10, fontSize: 14, outline: 'none', width: '100%', boxSizing: 'border-box', background: 'white' };
  const lbl = { display: 'block', fontSize: 11, fontWeight: 600, color: '#777', letterSpacing: '.11em', textTransform: 'uppercase', marginBottom: 5 };
  return (
    <div style={{ background: '#FAF7FB', borderRadius: 14, padding: '18px 16px', marginBottom: 20, border: '1px solid #EDE8EA' }}>
      <div style={{ fontWeight: 800, fontSize: 15, color: '#1A1118', marginBottom: 14 }}>{form.id ? '✏️ Editar Combo' : '➕ Nuevo Combo'}</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
        <div style={{ gridColumn: 'span 2' }}>
          <label style={lbl}>Nombre del combo *</label>
          <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="Set de aretes dorados" style={inp} />
        </div>
        <div>
          <label style={lbl}>Precio del combo *</label>
          <input type="number" min="0" step="0.01" value={form.price} onChange={e => set('price', e.target.value)} placeholder="45.00" style={inp} />
        </div>
        <div>
          <label style={lbl}>URL de imagen (opcional)</label>
          <input value={form.imageUrl || ''} onChange={e => set('imageUrl', e.target.value)} placeholder="https://..." style={inp} />
        </div>
      </div>
      {form.price && origTotal > 0 && Number(form.price) < origTotal && (
        <div style={{ fontSize: 12, color: '#10B981', fontWeight: 600, marginBottom: 10 }}>
          💰 Ahorro vs. precio individual: ${(origTotal - Number(form.price)).toFixed(2)} (de ${origTotal.toFixed(2)})
        </div>
      )}
      <div style={{ marginBottom: 14 }}>
        <label style={lbl}>Productos del combo (mínimo 2) *</label>
        <div style={{ maxHeight: 200, overflowY: 'auto', border: '1.5px solid #e4e4e4', borderRadius: 10, background: 'white' }}>
          {products.filter(p => p.available !== false).map(p => (
            <label key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 13px', cursor: 'pointer', borderBottom: '1px solid #f5f5f5', fontSize: 13 }}>
              <input type="checkbox" checked={form.items.includes(p.id)} onChange={() => toggleItem(p.id)}
                style={{ width: 15, height: 15, accentColor: '#E85D8A' }} />
              <span style={{ flex: 1 }}>{p.name}</span>
              <span style={{ color: '#A89AAF', fontSize: 12 }}>${p.price}</span>
            </label>
          ))}
        </div>
        {form.items.length > 0 && <div style={{ fontSize: 11, color: '#7A6880', marginTop: 4 }}>{form.items.length} producto(s) seleccionado(s)</div>}
      </div>
      <div style={{ display: 'flex', gap: 10 }}>
        <button onClick={onClose} style={{ flex: 1, padding: 12, border: '1.5px solid #ddd', borderRadius: 99, color: '#666', fontSize: 14, fontWeight: 600, cursor: 'pointer', background: 'white' }}>Cancelar</button>
        <button onClick={save} disabled={!form.name || !form.price || form.items.length < 2}
          style={{ flex: 2, padding: 12, background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', color: 'white', borderRadius: 99, fontSize: 14, fontWeight: 700, opacity: (!form.name || !form.price || form.items.length < 2) ? .5 : 1, cursor: 'pointer', border: 'none' }}>
          {form.id ? '💾 Guardar Combo' : '+ Crear Combo'}
        </button>
      </div>
    </div>
  );
}

                  <div style={{ fontSize: 12, color: '#A89AAF' }}>{p.category}</div>

                    <span style={{ fontWeight: 800, color: '#FF6B00', fontSize: 15 }}>${p.promo.price}</span>

            ))}

        )}

// ── Mercado Tab ─────────────────────────────────────────────────────────────
function MercadoTab({ products }) {
  const FB_SR  = 'https://cacusa-pos-default-rtdb.firebaseio.com/cacusa_surcharges.json';
  const FB_MKT = 'https://cacusa-pos-default-rtdb.firebaseio.com/cacusa_markets.json';

  const [surcharges, setSurcharges] = useState({});
  const [markets, setMarkets]       = useState({});
  const [fbLoading, setFbLoading]   = useState(true);
  const [saving, setSaving]         = useState(false);
  const [msg, setMsg]               = useState('');
  const [section, setSection]       = useState(null); // null | 'surcharge' | 'market'
  const [search, setSearch]         = useState('');
  const [openCats, setOpenCats]     = useState({});

  useEffect(() => {
    (async () => {
      try {
        const [sr, mk] = await Promise.all([fetch(FB_SR), fetch(FB_MKT)]);
        if (sr.ok) { const d = await sr.json(); setSurcharges(d && typeof d === 'object' ? d : {}); }
        if (mk.ok) { const d = await mk.json(); setMarkets(d && typeof d === 'object' ? d : {}); }
      } catch(_) {}
      setFbLoading(false);
    })();
  }, []);

  const save = async () => {
    setSaving(true); setMsg('');
    try {
      const [r1, r2] = await Promise.all([
        fetch(FB_SR,  { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(surcharges) }),
        fetch(FB_MKT, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(markets) })
      ]);
      if (!r1.ok || !r2.ok) throw new Error('Firebase error');
      setMsg('✅ ¡Guardado!');
      setTimeout(() => setMsg(''), 4000);
    } catch(e) {
      setMsg('❌ Error al guardar. Verifica tu conexión.');
    }
    setSaving(false);
  };

  const prods = products.filter(p => p.available !== false);
  const q = search.trim().toLowerCase();
  const filtered = q
    ? prods.filter(p => p.name.toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q))
    : prods;

  const catOrder = [...new Set(prods.map(p => p.category || 'Sin categoría'))];
  const visibleCats = catOrder.filter(cat => filtered.some(p => (p.category||'Sin categoría') === cat));
  const grouped = cat => filtered.filter(p => (p.category||'Sin categoría') === cat);
  const isOpen  = cat => q ? true : !!openCats[cat];
  const toggleCat = cat => setOpenCats(o => ({ ...o, [cat]: !o[cat] }));

  const surchargeCount = prods.filter(p => surcharges[p.id]).length;
  const ecCount = prods.filter(p => (markets[p.id]||'both') === 'ec').length;
  const usCount = prods.filter(p => (markets[p.id]||'both') === 'us').length;

  if (fbLoading) return (
    <div style={{ textAlign: 'center', padding: '80px 0', color: '#aaa' }}>
      <div style={{ fontSize: 44, marginBottom: 12 }}>⏳</div>
      <div style={{ fontSize: 16 }}>Cargando configuración…</div>
    </div>
  );

  /* ── Home: two big cards ── */
  if (!section) return (
    <div style={{ maxWidth: 480, margin: '0 auto' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>

        <button onClick={() => { setSection('surcharge'); setSearch(''); setOpenCats({}); }}
          style={{ background: 'white', borderRadius: 20, padding: '24px 14px', boxShadow: '0 2px 16px rgba(232,93,138,.12)', border: '2px solid rgba(232,93,138,.2)', cursor: 'pointer', textAlign: 'center', fontFamily: 'inherit', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <div style={{ fontSize: 46 }}>💳</div>
          <div style={{ fontWeight: 800, fontSize: 15, color: '#1A1118' }}>Recargo</div>
          <div style={{ fontSize: 11, color: '#A89AAF', marginBottom: 6 }}>+4% tarjeta/Square</div>
          <div style={{ background: surchargeCount > 0 ? '#FFF0F6' : '#f5f5f5', color: surchargeCount > 0 ? '#E85D8A' : '#bbb', borderRadius: 99, padding: '4px 12px', fontSize: 12, fontWeight: 700 }}>
            {surchargeCount} activo{surchargeCount !== 1 ? 's' : ''}
          </div>
        </button>

        <button onClick={() => { setSection('market'); setSearch(''); setOpenCats({}); }}
          style={{ background: 'white', borderRadius: 20, padding: '24px 14px', boxShadow: '0 2px 16px rgba(41,128,185,.1)', border: '2px solid rgba(41,128,185,.2)', cursor: 'pointer', textAlign: 'center', fontFamily: 'inherit', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <div style={{ fontSize: 46 }}>🌍</div>
          <div style={{ fontWeight: 800, fontSize: 15, color: '#1A1118' }}>Mercados</div>
          <div style={{ fontSize: 11, color: '#A89AAF', marginBottom: 6 }}>Ecuador / USA</div>
          <div style={{ display: 'flex', gap: 5, justifyContent: 'center', flexWrap: 'wrap' }}>
            {ecCount > 0 && <span style={{ background: 'rgba(39,174,96,.1)', color: '#1a7a44', borderRadius: 99, padding: '3px 8px', fontSize: 11, fontWeight: 700 }}>🇪🇨 {ecCount}</span>}
            {usCount > 0 && <span style={{ background: 'rgba(41,128,185,.1)', color: '#1a5c8a', borderRadius: 99, padding: '3px 8px', fontSize: 11, fontWeight: 700 }}>🇺🇸 {usCount}</span>}
            {ecCount === 0 && usCount === 0 && <span style={{ color: '#bbb', fontSize: 11 }}>todos en ambos</span>}
          </div>
        </button>

      </div>
      {msg && <div style={{ borderRadius: 12, padding: '11px 16px', fontSize: 13, fontWeight: 600, background: msg.startsWith('✅') ? '#D1FAE5' : '#FEE2E2', color: msg.startsWith('✅') ? '#065F46' : '#DC2626' }}>{msg}</div>}
    </div>
  );

  /* ── Section view ── */
  const isSurcharge = section === 'surcharge';
  return (
    <div style={{ maxWidth: 600, margin: '0 auto' }}>

      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
        <button onClick={() => { setSection(null); setSearch(''); }}
          style={{ padding: '7px 14px', borderRadius: 99, border: '1.5px solid #EDE8EA', background: 'white', cursor: 'pointer', fontSize: 13, fontWeight: 600, color: '#555', fontFamily: 'inherit' }}>
          ← Volver
        </button>
        <div style={{ fontWeight: 800, fontSize: 16, color: '#1A1118' }}>
          {isSurcharge ? '💳 Recargo del 4%' : '🌍 Mercados'}
        </div>
      </div>

      {/* Search */}
      <div style={{ position: 'relative', marginBottom: 14 }}>
        <span style={{ position: 'absolute', left: 13, top: '50%', transform: 'translateY(-50%)', fontSize: 15, pointerEvents: 'none', color: '#bbb' }}>🔍</span>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar producto o categoría…"
          style={{ width: '100%', boxSizing: 'border-box', padding: '11px 38px 11px 40px', border: '1.5px solid #EDE8EA', borderRadius: 12, fontSize: 14, outline: 'none', fontFamily: 'inherit', background: 'white' }} />
        {search && <button onClick={() => setSearch('')}
          style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', fontSize: 15, color: '#bbb', lineHeight: 1 }}>✕</button>}
      </div>

      {/* Categories */}
      {visibleCats.length === 0 && (
        <div style={{ textAlign: 'center', padding: '40px 0', color: '#bbb', fontSize: 14 }}>
          {q ? `Sin resultados para "${q}"` : 'No hay productos activos.'}
        </div>
      )}

      {visibleCats.map(cat => (
        <div key={cat} style={{ background: 'white', borderRadius: 16, boxShadow: '0 1px 6px rgba(0,0,0,.06)', marginBottom: 10, overflow: 'hidden', border: '1px solid #f0ecf0' }}>

          {/* Category header */}
          <button onClick={() => toggleCat(cat)}
            style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '13px 18px', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontWeight: 700, fontSize: 14, color: '#1A1118' }}>{cat}</span>
              <span style={{ background: '#f0ecf0', borderRadius: 99, padding: '2px 8px', fontSize: 11, fontWeight: 700, color: '#7A6880' }}>{grouped(cat).length}</span>
            </div>
            <span style={{ color: '#bbb', fontSize: 12, display: 'inline-block', transform: isOpen(cat) ? 'rotate(180deg)' : 'none', transition: 'transform .2s' }}>▼</span>
          </button>

          {/* Products */}
          {isOpen(cat) && (
            <div style={{ borderTop: '1px solid #f5f3f5', padding: '8px 10px 10px' }}>
              {grouped(cat).map(p => {
                const has = !!surcharges[p.id];
                const adj = (Math.round(p.price * 1.04 * 100) / 100).toFixed(2);
                const m   = markets[p.id] || 'both';
                const mBorder = m === 'ec' ? '#27AE60' : m === 'us' ? '#2980B9' : '#ddd';
                const mColor  = m === 'ec' ? '#1a7a44' : m === 'us' ? '#1a5c8a' : '#888';
                const mBg     = m === 'ec' ? 'rgba(39,174,96,.08)' : m === 'us' ? 'rgba(41,128,185,.08)' : 'white';
                return (
                  <div key={p.id}
                    onClick={isSurcharge ? () => setSurcharges(s => { const n={...s}; n[p.id] ? delete n[p.id] : (n[p.id]=true); return n; }) : undefined}
                    style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', borderRadius: 12,
                      border: `1.5px solid ${isSurcharge ? (has ? '#E85D8A' : '#EDE8EA') : '#EDE8EA'}`,
                      background: isSurcharge && has ? '#FFF0F6' : 'white',
                      marginBottom: 7, cursor: isSurcharge ? 'pointer' : 'default', transition: 'all .15s' }}>
                    {p.imageUrl
                      ? <img src={p.imageUrl} style={{ width: 36, height: 36, objectFit: 'cover', borderRadius: 8, flexShrink: 0 }} alt="" />
                      : <div style={{ width: 36, height: 36, borderRadius: 8, background: 'linear-gradient(135deg,#FCE8F3,#EE6FA8)', flexShrink: 0 }} />}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, fontSize: 13, color: '#1A1118', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.name}</div>
                      <div style={{ fontSize: 11, color: isSurcharge && has ? '#E85D8A' : '#A89AAF' }}>
                        ${isSurcharge && has ? adj : Number(p.price).toFixed(2)}
                        {isSurcharge && has && <span style={{ color: '#ddd', marginLeft: 5, textDecoration: 'line-through' }}>${Number(p.price).toFixed(2)}</span>}
                      </div>
                    </div>
                    {isSurcharge
                      ? <div style={{ width: 40, height: 23, borderRadius: 12, background: has ? '#E85D8A' : '#ddd', position: 'relative', flexShrink: 0, transition: 'background .2s' }}>
                          <div style={{ width: 17, height: 17, borderRadius: '50%', background: 'white', position: 'absolute', top: 3, left: has ? 20 : 3, transition: 'left .2s', boxShadow: '0 1px 3px rgba(0,0,0,.2)' }} />
                        </div>
                      : <select value={m} onChange={e => setMarkets(mk => ({ ...mk, [p.id]: e.target.value }))} onClick={e => e.stopPropagation()}
                          style={{ padding: '6px 8px', border: `1.5px solid ${mBorder}`, borderRadius: 9, fontSize: 11, fontWeight: 600, outline: 'none', cursor: 'pointer', flexShrink: 0, color: mColor, background: mBg, fontFamily: 'inherit' }}>
                          <option value="both">🌍 Ambos</option>
                          <option value="ec">🇪🇨 Ecuador</option>
                          <option value="us">🇺🇸 USA</option>
                        </select>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ))}

      {/* Save */}
      {msg && <div style={{ borderRadius: 12, padding: '11px 16px', marginBottom: 14, fontSize: 13, fontWeight: 600, background: msg.startsWith('✅') ? '#D1FAE5' : '#FEE2E2', color: msg.startsWith('✅') ? '#065F46' : '#DC2626' }}>{msg}</div>}
      <button onClick={save} disabled={saving}
        style={{ width: '100%', padding: 14, background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', color: 'white', borderRadius: 14, fontWeight: 700, fontSize: 15, border: 'none', cursor: saving ? 'not-allowed' : 'pointer', opacity: saving ? .7 : 1, boxShadow: '0 4px 20px rgba(155,93,229,.3)', marginBottom: 24, fontFamily: 'inherit' }}>
        {saving ? '⏳ Guardando…' : '💾 Guardar cambios'}
      </button>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession]         = useState(() => {
    try { const s = sessionStorage.getItem('cacusa_session'); return s ? JSON.parse(s) : null; }
    catch (_) { return null; }
  });
  const [products, setProducts]       = useState([]);
  const [productsSha, setProductsSha] = useState(null);
  const [whatsappNum, setWhatsappNum] = useState('');
  const [categories, setCategories]   = useState(DEFAULT_CATEGORIES);
  const [materials, setMaterials]     = useState(DEFAULT_MATERIALS);
  const [shipping, setShipping]       = useState(DEFAULT_SHIPPING);
  const [texts, setTexts]             = useState(DEFAULT_TEXTS);
  const [home, setHome]               = useState(DEFAULT_HOME);
  const [pages, setPages]             = useState(DEFAULT_PAGES);
  const [orders, setOrders]           = useState([]);
  const [ordersSha, setOrdersSha]     = useState(null);
  const [loading, setLoading]         = useState(false);
  const [syncing, setSyncing]         = useState(false);
  const [syncMsg, setSyncMsg]         = useState('');
  const [dirty, setDirty]             = useState(false);
  const [filter, setFilter]           = useState('all');
  const [search, setSearch]           = useState('');
  const [editProduct, setEditProd]    = useState(null);
  const [showModal, setShowModal]     = useState(false);
  const [delConfirm, setDelConfirm]   = useState(null);
  const [showPwd, setShowPwd]         = useState(false);
  const [showMenu, setShowMenu]       = useState(false);
  const [activeTab, setActiveTab]     = useState('products');
  const [showOrderModal, setShowOrderModal] = useState(false);
  const [pushState, setPushState]           = useState('');  // ''|'subscribed'|'denied'|'unsupported'|'error'
  const [fbSurcharges, setFbSurcharges]     = useState({});
  const [fbMarkets, setFbMarkets]           = useState({});
  const [combos, setCombos]                 = useState([]);

  const FB_SR  = 'https://cacusa-pos-default-rtdb.firebaseio.com/cacusa_surcharges.json';
  const FB_MKT = 'https://cacusa-pos-default-rtdb.firebaseio.com/cacusa_markets.json';

  useEffect(() => {
    (async () => {
      try {
        const [r1, r2] = await Promise.all([fetch(FB_SR), fetch(FB_MKT)]);
        if (r1.ok) { const d = await r1.json(); if (d && typeof d === 'object') setFbSurcharges(d); }
        if (r2.ok) { const d = await r2.json(); if (d && typeof d === 'object') setFbMarkets(d); }
      } catch (_) {}
    })();
  }, []);

  useEffect(() => {
    if (session) {
      try { sessionStorage.setItem('cacusa_session', JSON.stringify(session)); } catch (_) {}
      loadData();
      setupPush(session.token, setPushState);
    }
  }, [session]);

  const sessionExpired = () => {
    setSyncMsg('⚠️ Tu sesión expiró por seguridad. Cierra sesión y vuelve a entrar.');
  };

  const loadData = async () => {
    setLoading(true); setSyncMsg('');
    try {
      const res = await apiLoad(session.token);
      // ── Productos + configuración ──
      if (res.products) {
        const data = JSON.parse(res.products);
        const prods = Array.isArray(data) ? data : (data.products || []);
        setProducts(prods.map(p => ({ ...p, available: p.available !== false })));
        if (Array.isArray(data.combos)) setCombos(data.combos);
        const cfg = (data.config || {});
        setWhatsappNum(data.whatsapp || cfg.whatsapp || '');
        if (Array.isArray(cfg.categories) && cfg.categories.length) setCategories(cfg.categories);
        if (Array.isArray(cfg.materials)  && cfg.materials.length)  setMaterials(cfg.materials);
        if (cfg.shipping && typeof cfg.shipping === 'object') setShipping({ ...DEFAULT_SHIPPING, ...cfg.shipping });
        if (cfg.texts && typeof cfg.texts === 'object') setTexts({ ...DEFAULT_TEXTS, ...cfg.texts });
        if (cfg.home && typeof cfg.home === 'object') {
          const h = cfg.home;
          setHome({
            ...DEFAULT_HOME, ...h,
            stats: Array.isArray(h.stats) ? h.stats : DEFAULT_HOME.stats,
            person: (h.person && typeof h.person === 'object')
              ? { ...DEFAULT_HOME.person, ...h.person, steps: Array.isArray(h.person.steps) ? h.person.steps : DEFAULT_HOME.person.steps }
              : DEFAULT_HOME.person,
            testimonials: Array.isArray(h.testimonials) ? h.testimonials : DEFAULT_HOME.testimonials,
            footer: (h.footer && typeof h.footer === 'object') ? { ...DEFAULT_HOME.footer, ...h.footer } : DEFAULT_HOME.footer
          });
        }
        if (cfg.pages && typeof cfg.pages === 'object') {
          setPages({
            envios:       { ...DEFAULT_PAGES.envios,       ...(cfg.pages.envios       || {}) },
            devoluciones: { ...DEFAULT_PAGES.devoluciones, ...(cfg.pages.devoluciones || {}) },
            cuidados:     { ...DEFAULT_PAGES.cuidados,     ...(cfg.pages.cuidados     || {}) }
          });
        }
      } else {
        setProducts([]);
        setSyncMsg('📦 No hay productos aún. Agrega tu primer producto y haz clic en "Publicar".');
      }
      // ── Pedidos ──
      if (res.orders) {
        try { setOrders(JSON.parse(res.orders).orders || []); } catch (_) { setOrders([]); }
      } else { setOrders([]); }
    } catch (err) {
      if (err.status === 401) sessionExpired();
      else setSyncMsg('❌ Error cargando datos: ' + err.message);
    }
    setLoading(false);
  };

  const publish = async () => {
    setSyncing(true); setSyncMsg('☁️ Guardando de forma segura…');
    try {
      const json = JSON.stringify({
        version: '1.0',
        lastUpdated: new Date().toISOString(),
        updatedBy: session.username,
        whatsapp: whatsappNum,
        config: { whatsapp: whatsappNum, categories, materials, shipping, texts, home, pages },
        products,
        combos
      }, null, 2);
      await apiSave(session.token, PRODUCTS_PATH, json, `[Admin] Productos - ${session.username}`);
      // Pedidos (no bloquea si falla)
      try {
        const oJson = JSON.stringify({ version: '1.0', lastUpdated: new Date().toISOString(), orders }, null, 2);
        await apiSave(session.token, ORDERS_PATH, oJson, `[Admin] Pedidos - ${session.username}`);
      } catch (oe) { console.warn('orders save:', oe); }
      setDirty(false);
      setSyncMsg('✅ ¡Publicado en cacusabytaitus.com! La tienda se actualiza en 1–2 min.');
      setTimeout(() => setSyncMsg(''), 8000);
    } catch (e) {
      setSyncMsg(e.status === 401 ? '⚠️ Tu sesión expiró. Cierra sesión y vuelve a entrar (tus cambios siguen aquí).' : '❌ Error: ' + e.message);
    }
    setSyncing(false);
  };

  const saveProduct = async p => {
    const { surcharge, market, marketEC, marketUS, promoEnabled, promoPrice, promoLabel, promoEndsAt, ...prodData } = p;
    setProducts(prev => {
      const i = prev.findIndex(x => x.id === prodData.id);
      return i > -1 ? prev.map((x, j) => j === i ? prodData : x) : [...prev, prodData];
    });
    const newSurcharges = { ...fbSurcharges };
    if (surcharge) newSurcharges[prodData.id] = true;
    else delete newSurcharges[prodData.id];
    setFbSurcharges(newSurcharges);
    const newMarkets = { ...fbMarkets };
    if (market && market !== 'both') newMarkets[prodData.id] = market;
    else delete newMarkets[prodData.id];
    setFbMarkets(newMarkets);
    try {
      await Promise.all([
        fetch(FB_SR,  { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newSurcharges) }),
        fetch(FB_MKT, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newMarkets) })
      ]);
    } catch (_) {}
    setDirty(true); setShowModal(false); setEditProd(null);
  };
  const toggleProd = p => { setProducts(prev => prev.map(x => x.id === p.id ? { ...x, available: !x.available } : x)); setDirty(true); };
  const deleteProd = p => { setProducts(prev => prev.filter(x => x.id !== p.id)); setDelConfirm(null); setDirty(true); };
  const moveProd = (p, dir) => {
    setProducts(prev => {
      const idx = prev.findIndex(x => x.id === p.id);
      if (dir === 'up' && idx <= 0) return prev;
      if (dir === 'down' && idx >= prev.length - 1) return prev;
      const next = [...prev];
      const swap = dir === 'up' ? idx - 1 : idx + 1;
      [next[idx], next[swap]] = [next[swap], next[idx]];
      return next;
    });
    setDirty(true);
  };

  if (!session) return <LoginScreen onLogin={s => setSession(s)} />;

  const filtered = products.filter(p => {
    if (filter !== 'all' && p.category !== filter) return false;
    if (search && !p.name.toLowerCase().includes(search.toLowerCase()) && !(p.description || '').toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  const activeCount = products.filter(p => p.available !== false).length;
  const pendingOrders = orders.filter(o => ['Nuevo', 'Confirmado', 'En proceso'].includes(o.estado || 'Nuevo')).length;

  return (
    <div style={{ minHeight: '100vh', background: '#F0EFF5' }} onClick={() => showMenu && setShowMenu(false)}>

      {/* ── Header ── */}
      <div style={{ background: 'linear-gradient(135deg,#1A1124,#2D1B2E)', color: 'white', padding: '0 20px', display: 'flex', alignItems: 'center', gap: 10, height: 56, position: 'sticky', top: 0, zIndex: 200, boxShadow: '0 2px 16px rgba(0,0,0,.3)' }}>
        <div style={{ fontFamily: 'Georgia,serif', fontWeight: 900, fontSize: 20, letterSpacing: '.15em', background: 'linear-gradient(135deg,#E85D8A,#C9A84C)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>CACUSA</div>
        <div style={{ color: 'rgba(255,255,255,.3)', fontSize: 12 }}>/admin</div>
        <div style={{ flex: 1 }} />
        {dirty && <span style={{ fontSize: 11, color: '#FBBF24', fontWeight: 700 }}>● Cambios sin publicar</span>}
        <a href={STORE_URL} target="_blank" rel="noopener" style={{ color: 'rgba(255,255,255,.5)', fontSize: 12, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 4 }}>🌐 Tienda</a>
        <button
          onClick={() => pushState !== 'subscribed' && setupPush(session.token, setPushState)}
          title={pushState === 'subscribed' ? 'Notificaciones activas' : pushState === 'denied' ? 'Notificaciones bloqueadas en el navegador' : 'Activar notificaciones'}
          style={{ width: 34, height: 34, borderRadius: '50%', background: pushState === 'subscribed' ? 'rgba(34,197,94,.25)' : 'rgba(255,255,255,.1)', color: 'rgba(255,255,255,.75)', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', border: 'none', cursor: pushState === 'subscribed' ? 'default' : 'pointer' }}>
          {pushState === 'subscribed' ? '🔔' : pushState === 'denied' ? '🔕' : '🔔'}
        </button>
        <button onClick={e => { e.stopPropagation(); setShowMenu(s => !s); }}
          style={{ width: 34, height: 34, borderRadius: '50%', background: 'rgba(255,255,255,.1)', color: 'rgba(255,255,255,.75)', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', border: 'none' }}>
          {USERS[session.username].avatar}
        </button>
      </div>

      {showMenu && (
        <div style={{ position: 'fixed', top: 63, right: 16, background: 'white', borderRadius: 14, padding: '8px', boxShadow: '0 8px 32px rgba(0,0,0,.15)', zIndex: 300, minWidth: 210, animation: 'fadeIn .2s ease' }}
          onClick={e => e.stopPropagation()}>
          <div style={{ padding: '8px 12px', fontSize: 12, color: '#aaa', fontWeight: 600, borderBottom: '1px solid #f0f0f0', marginBottom: 4 }}>{USERS[session.username].avatar} {session.name}</div>
          {[
            ['🔄 Recargar datos', () => { loadData(); setShowMenu(false); }],
            ['🌐 Ver tienda', () => { window.open(STORE_URL, '_blank'); setShowMenu(false); }],
            ['↩ Cerrar sesión', () => { sessionStorage.clear(); setSession(null); }]
          ].map(([l, fn]) => (
            <button key={l} onClick={fn} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '9px 12px', fontSize: 13, color: '#333', borderRadius: 8, transition: 'background .15s', border: 'none', cursor: 'pointer', background: 'none', fontFamily: 'inherit' }}>{l}</button>
          ))}
        </div>
      )}

      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '20px 16px' }}>

        {/* ── Stats ── */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(110px,1fr))', gap: 10, marginBottom: 20 }}>
          {[
            { label: 'Total joyas', val: products.length,              col: '#9B5DE5', icon: '💎' },
            { label: 'Activas',     val: activeCount,                   col: '#10B981', icon: '✅' },
            { label: 'Inactivas',   val: products.length - activeCount, col: '#F59E0B', icon: '⏸' },
            { label: 'Pedidos act', val: pendingOrders,                 col: '#E85D8A', icon: '📦' },
            ...categories.map(c => ({ label: c, val: products.filter(p => p.category === c).length, col: '#6B7280', icon: '🏷' }))
          ].map((s, i) => (
            <div key={i} style={{ background: 'white', borderRadius: 14, padding: '13px 14px', boxShadow: '0 1px 6px rgba(0,0,0,.06)', borderLeft: `4px solid ${s.col}`, cursor: 'pointer', transition: 'transform .15s' }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: s.col }}>{s.val}</div>
              <div style={{ fontSize: 10, color: '#888', marginTop: 2 }}>{s.icon} {s.label}</div>
            </div>
          ))}
        </div>

        {/* ── Sync message ── */}
        {syncMsg && (
          <div style={{ borderRadius: 12, padding: '11px 16px', marginBottom: 14, fontSize: 13, fontWeight: 600, background: syncMsg.startsWith('✅') ? '#D1FAE5' : syncMsg.startsWith('❌') ? '#FEE2E2' : '#FEF3C7', color: syncMsg.startsWith('✅') ? '#065F46' : syncMsg.startsWith('❌') ? '#DC2626' : '#92400E' }}>
            {syncMsg}
          </div>
        )}

        {/* ── WhatsApp + Publish bar ── */}
        <div style={{ background: 'white', borderRadius: 12, padding: '12px 16px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 12, boxShadow: '0 1px 6px rgba(0,0,0,.05)', flexWrap: 'wrap' }}>
          <span style={{ fontSize: 18 }}>📱</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: '#555', whiteSpace: 'nowrap' }}>WhatsApp para pedidos:</span>
          <input value={whatsappNum} onChange={e => { setWhatsappNum(e.target.value); setDirty(true); }}
            placeholder="+593 99 999 9999"
            style={{ flex: 1, minWidth: 180, padding: '8px 12px', border: '1.5px solid #e0e0e0', borderRadius: 8, fontSize: 13, outline: 'none', color: '#333' }} />
          <button onClick={publish} disabled={!dirty || syncing}
            style={{ padding: '10px 22px', background: dirty ? 'linear-gradient(135deg,#1A1124,#2D1B2E)' : '#e0e0e0', color: dirty ? 'white' : '#aaa', borderRadius: 99, fontWeight: 700, fontSize: 13, whiteSpace: 'nowrap', opacity: syncing ? .7 : 1, transition: 'all .2s', boxShadow: dirty ? '0 4px 12px rgba(0,0,0,.2)' : 'none', border: 'none', cursor: dirty && !syncing ? 'pointer' : 'default' }}>
            {syncing ? '⏳ Publicando…' : '☁️ Publicar cambios'}
          </button>
        </div>

        {/* ── Tab navigation ── */}
        <div style={{ display: 'flex', marginBottom: 20, background: 'white', borderRadius: 12, overflowX: 'auto', WebkitOverflowScrolling: 'touch', border: '1px solid #EDE8EA' }}>
          {[
            ['products',   '💎 Productos',  products.length],
            ['orders',     '📦 Pedidos',    pendingOrders],
            ['descuentos', '🏷️ Descuentos', products.filter(p => p.promo && p.promo.price).length + combos.length],
            ['mercado',    '🌍 Mercado',    0],
            ['landing',    '🏠 Landing',    0],
            ['pages',      '📄 Páginas',    0],
            ['settings',   '⚙️ Ajustes',    0]
          ].map(([tab, label, badge]) => (
            <button key={tab} onClick={() => setActiveTab(tab)}
              style={{ flexShrink: 0, minWidth: 90, padding: '13px 16px', fontWeight: 700, fontSize: 14, border: 'none', cursor: 'pointer', background: activeTab === tab ? 'white' : '#F9F5F7', color: activeTab === tab ? '#E8508A' : '#7A6880', borderBottom: activeTab === tab ? '2.5px solid #E8508A' : '2.5px solid transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, transition: 'all .15s', fontFamily: 'inherit', whiteSpace: 'nowrap' }}>
              {label}
              {badge > 0 && <span style={{ background: activeTab === tab ? '#E8508A' : '#C4B5C8', color: 'white', borderRadius: 99, fontSize: 11, padding: '1px 7px', fontWeight: 800 }}>{badge}</span>}
            </button>
          ))}
        </div>

        {/* ── Products tab ── */}
        {activeTab === 'products' && (
          <div>
            {/* Toolbar */}
            <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Buscar por nombre o descripción…"
                style={{ flex: 1, minWidth: 200, padding: '10px 14px', border: '1.5px solid #e0e0e0', borderRadius: 10, fontSize: 14, outline: 'none', background: 'white' }} />
              <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                {['all', ...categories].map(cat => {
                  const cnt = cat === 'all' ? products.length : products.filter(p => p.category === cat).length;
                  return (
                    <button key={cat} onClick={() => setFilter(cat)}
                      style={{ padding: '8px 13px', borderRadius: 99, fontSize: 12, fontWeight: 600, background: filter === cat ? '#E85D8A' : 'white', color: filter === cat ? 'white' : '#666', border: filter === cat ? 'none' : '1.5px solid #e0e0e0', boxShadow: filter === cat ? '0 2px 8px rgba(232,93,138,.3)' : 'none', transition: 'all .2s', cursor: 'pointer' }}>
                      {cat === 'all' ? 'Todo' : cat} ({cnt})
                    </button>
                  );
                })}
              </div>
              <button onClick={() => { setEditProd(null); setShowModal(true); }}
                style={{ padding: '10px 20px', background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', color: 'white', borderRadius: 99, fontWeight: 700, fontSize: 13, boxShadow: '0 4px 16px rgba(155,93,229,.3)', whiteSpace: 'nowrap', border: 'none', cursor: 'pointer' }}>
                + Nuevo Producto
              </button>
            </div>

            {/* Grid */}
            {loading ? (
              <div style={{ textAlign: 'center', padding: '80px 0', color: '#aaa' }}>
                <div style={{ fontSize: 44, marginBottom: 12 }}>⏳</div>
                <div style={{ fontSize: 16 }}>Cargando…</div>
              </div>
            ) : filtered.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '80px 0', color: '#aaa' }}>
                <div style={{ fontSize: 52, marginBottom: 12 }}>💎</div>
                <div style={{ fontSize: 16, marginBottom: 8 }}>{search ? `Sin resultados para "${search}"` : 'Sin productos en esta categoría'}</div>
                {!search && <button onClick={() => { setEditProd(null); setShowModal(true); }}
                  style={{ padding: '10px 24px', background: 'linear-gradient(135deg,#E85D8A,#9B5DE5)', color: 'white', borderRadius: 99, fontWeight: 700, fontSize: 13, marginTop: 8, border: 'none', cursor: 'pointer' }}>
                  + Agregar primer producto
                </button>}
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(200px,1fr))', gap: 14 }}>
                {filtered.map(p => {
                  const globalIdx = products.findIndex(x => x.id === p.id);
                  return (
                    <ProductCard key={p.id} p={p}
                      onEdit={p => { setEditProd(p); setShowModal(true); }}
                      onDelete={setDelConfirm}
                      onToggle={toggleProd}
                      onMoveUp={p => moveProd(p, 'up')}
                      onMoveDown={p => moveProd(p, 'down')}
                      canUp={globalIdx > 0}
                      canDown={globalIdx < products.length - 1}
                    />
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── Descuentos tab ── */}
        {activeTab === 'descuentos' && (
          <DescuentosTab
            products={products}
            combos={combos}
            setCombos={c => { setCombos(c); setDirty(true); }}
            onEditProduct={p => { setEditProd(p); setShowModal(true); setActiveTab('products'); }}
          />
        )}

        {/* ── Orders tab ── */}
        {activeTab === 'orders' && (
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <div style={{ fontWeight: 800, fontSize: 18, color: '#1A1118' }}>
                Pedidos <span style={{ color: '#A89AAF', fontWeight: 400, fontSize: 14 }}>{orders.length} total</span>
              </div>
              <button onClick={() => setShowOrderModal(true)}
                style={{ padding: '10px 20px', background: 'linear-gradient(135deg,#E8508A,#9B5DE5)', color: 'white', borderRadius: 99, fontWeight: 700, fontSize: 13, border: 'none', cursor: 'pointer', boxShadow: '0 4px 12px rgba(232,80,138,.3)' }}>
                + Nuevo pedido
              </button>
            </div>

            {orders.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '80px 0', color: '#aaa' }}>
                <div style={{ fontSize: 52, marginBottom: 12 }}>📦</div>
                <div style={{ fontSize: 16, marginBottom: 8 }}>No hay pedidos aún</div>
                <div style={{ fontSize: 13, color: '#ccc', maxWidth: 300, margin: '0 auto' }}>
                  Los pedidos de Square y WhatsApp aparecen aquí automáticamente. También puedes agregar uno manual.
                </div>
              </div>
            ) : (
              <div>
                {ORDER_STATES.map(estado => {
                  const grupo = orders.filter(o => (o.estado || 'Nuevo') === estado);
                  if (grupo.length === 0) return null;
                  return (
                    <div key={estado} style={{ marginBottom: 24 }}>
                      <div style={{ fontWeight: 700, fontSize: 12, color: '#7A6880', letterSpacing: 1, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 8 }}>
                        <span style={{ background: STATE_COLORS[estado], color: 'white', padding: '3px 10px', borderRadius: 99, fontSize: 11 }}>{estado}</span>
                        <span>{grupo.length} pedido{grupo.length !== 1 ? 's' : ''}</span>
                      </div>
                      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(300px,1fr))', gap: 14 }}>
                        {grupo.map(o => (
                          <OrderCard key={o.id} order={o}
                            onStatusChange={(ord, newState) => { setOrders(prev => prev.map(x => x.id === ord.id ? { ...x, estado: newState } : x)); setDirty(true); }}
                            onDelete={ord => { setOrders(prev => prev.filter(x => x.id !== ord.id)); setDirty(true); }}
                          />
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── Landing tab ── */}
        {activeTab === 'landing' && (
          <LandingTab home={home} setHome={setHome} products={products} setDirty={setDirty} texts={texts} setTexts={setTexts} />
        )}

        {/* ── Pages tab ── */}
        {activeTab === 'pages' && (
          <PagesTab pages={pages} setPages={setPages} setDirty={setDirty} />
        )}

        {/* ── Mercado tab ── */}
        {activeTab === 'mercado' && (
          <MercadoTab products={products} />
        )}

        {/* ── Settings tab ── */}
        {activeTab === 'settings' && (
          <SettingsTab
            categories={categories} setCategories={setCategories}
            materials={materials} setMaterials={setMaterials}
            shipping={shipping} setShipping={setShipping}
            texts={texts} setTexts={setTexts}
            products={products} setProducts={setProducts}
            setDirty={setDirty}
          />
        )}

        {/* ── Modals ── */}
        {showOrderModal && <NewOrderModal open={showOrderModal} onClose={() => setShowOrderModal(false)} onSave={o => { setOrders(prev => [o, ...prev]); setDirty(true); }} />}
        {showModal && <ProductModal product={editProduct} token={session.token} categories={categories} materials={materials} fbSurcharges={fbSurcharges} fbMarkets={fbMarkets} onSave={saveProduct} onClose={() => { setShowModal(false); setEditProd(null); }} />}

        {delConfirm && (
          <div style={{ position: 'fixed', inset: 0, background: 'rgba(26,17,36,.65)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
            <div style={{ background: 'white', borderRadius: 22, padding: 32, maxWidth: 340, width: '100%', textAlign: 'center', boxShadow: '0 24px 60px rgba(0,0,0,.3)', animation: 'fadeIn .3s ease' }}>
              <div style={{ fontSize: 48, marginBottom: 14 }}>🗑️</div>
              <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 8 }}>¿Eliminar producto?</div>
              <div style={{ color: '#666', marginBottom: 24, fontSize: 14, lineHeight: 1.5 }}>"{delConfirm.name}" se eliminará de la tienda. Esta acción se aplica al publicar cambios.</div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={() => setDelConfirm(null)} style={{ flex: 1, padding: 13, border: '1.5px solid #e0e0e0', borderRadius: 99, fontWeight: 600, color: '#666', fontSize: 14, cursor: 'pointer', background: 'white' }}>Cancelar</button>
                <button onClick={() => deleteProd(delConfirm)} style={{ flex: 1, padding: 13, background: '#DC2626', color: 'white', borderRadius: 99, fontWeight: 700, fontSize: 14, border: 'none', cursor: 'pointer' }}>Eliminar</button>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
